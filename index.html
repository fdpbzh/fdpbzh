<style>
@font-face{
  font-family:'DK Longreach';
  src:url('DK%20Longreach.otf') format('opentype');
  font-display:swap;
}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --yellow:#FFC93C;
  --cream:#FFF5E1;
  --dark:#0F0628;
}
html,body{overflow-x:hidden}
body{font-family:'Manrope',sans-serif;color:var(--cream);background:var(--dark);min-height:100vh}

/* ============ HERO PLEIN ÉCRAN ============ */
.hero{
  position:relative;
  min-height:100vh;
  width:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  isolation:isolate;
}
/* Couche 1 — Affiche en background full bleed (WebP si dispo, PNG sinon) */
.hero-bg{
  position:absolute;
  inset:0;
  z-index:1;
  background-image:url('Affiche%20VFestival2.png');
  background-image:-webkit-image-set(
    url('Affiche%20VFestival2.webp') type('image/webp'),
    url('Affiche%20VFestival2.png') type('image/png')
  );
  background-image:image-set(
    url('Affiche%20VFestival2.webp') type('image/webp'),
    url('Affiche%20VFestival2.png') type('image/png')
  );
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-color:#0F0628;
  will-change:transform;
}
/* Sur écran large (desktop) : affiche entière + bandes violettes sur les côtés */
@media(min-width:900px){
  .hero-bg{
    background-size:contain;
  }
}
/* Léger voile pour faire ressortir le jeu */
.hero-bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,
    rgba(15,6,40,0) 0%,
    rgba(15,6,40,0) 40%,
    rgba(15,6,40,.45) 75%,
    rgba(15,6,40,.85) 100%);
  pointer-events:none;
}
/* Couche 2 — Contenu (jeu + nav) en bas */
.hero-content{
  position:relative;
  z-index:3;
  width:100%;
  padding:0 24px 32px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
/* Le jeu, dans un cadre subtil */
.game-card{
  width:100%;
  max-width:720px;
  aspect-ratio:16 / 9;
  border-radius:14px;
  overflow:hidden;
  background:#0d0014;
  box-shadow:
    0 25px 80px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,201,60,.5),
    0 0 0 6px rgba(15,6,40,.6);
}
.game-card iframe{width:100%;height:100%;border:0;display:block}
/* Tip + nav minimaliste */
.game-tip{
  font-size:13px;
  color:var(--cream);
  opacity:.85;
  letter-spacing:.5px;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
  text-align:center;
}
.nav-min{
  display:flex;
  gap:22px;
  flex-wrap:wrap;
  justify-content:center;
  font-size:13px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  font-weight:700;
}
.nav-min a{
  color:var(--cream);
  text-decoration:none;
  opacity:.85;
  transition:.2s;
  border-bottom:1px solid transparent;
  padding-bottom:2px;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.nav-min a:hover{opacity:1;color:var(--yellow);border-bottom-color:var(--yellow)}
/* Mobile : moins d'espace, jeu compact */
@media(max-width:700px){
  .hero{justify-content:flex-end}
  .hero-content{padding:0 14px 20px;gap:14px}
  .nav-min{gap:14px;font-size:11px}
  .game-card{box-shadow:0 15px 40px rgba(0,0,0,.7),0 0 0 1px rgba(255,201,60,.4)}
}
@media(max-width:480px){
  .nav-min{font-size:10px;letter-spacing:1px;gap:10px}
}
/* Très petits écrans portrait — affiche tient en hauteur naturellement */
@media(max-width:700px) and (orientation:portrait){
  .hero-bg{background-position:center 30%}
}
/* Prefers reduced motion */
@media (prefers-reduced-motion: reduce){
  .hero-bg{transform:none !important;will-change:auto}
}
</style>

<script>
// Léger parallax du background à l'apparition
(function(){
  const bg = document.querySelector('.hero-bg');
  if (!bg) return;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) return;

  let ticking = false;
  function update(){
    const y = window.scrollY;
    bg.style.transform = 'translate3d(0,' + (y * 0.4) + 'px,0)';
    ticking = false;
  }
  window.addEventListener('scroll', function(){
    if (!ticking){ requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
})();
</script>
