<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDP — Fête du Port · 8 août 2026 · Pors-Poulhan</title>
<meta name="description" content="La Fête du Port revient le 8 août 2026 à Pors-Poulhan. Concerts, championnats du monde inutiles, buvette. Open air 17h-2h, entrée libre.">
<meta name="theme-color" content="#0F0628">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🦪%3C/text%3E%3C/svg%3E">
<meta property="og:title" content="FDP — Fête du Port · 8 août 2026">
<meta property="og:description" content="Concerts, championnats du monde inutiles, buvette à Pors-Poulhan.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://fdp.bzh">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'DK Longreach';
  src:url('DK%20Longreach.otf') format('opentype');
  font-display:swap;
}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0F0628;--bg2:#1F1052;--card:#241158;--line:#3A2880;
  --yellow:#FFC93C;--orange:#FF7A1F;--lavender:#B5A5F0;--cream:#FFF5E1;
}
html,body{overflow-x:hidden}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--cream);line-height:1.6;min-height:100vh}

/* ============ HERO ============ */
.hero{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  isolation:isolate;
}
/* Couche 1 — ciel étoilé en parallax (le plus lent) */
.hero .sky{
  position:absolute;
  inset:-10% 0 0 0;
  height:140%;
  background-image:url('assets/ciel.png');
  background-size:cover;
  background-position:center top;
  z-index:1;
  will-change:transform;
}
/* Voile dégradé pour adoucir le bas */
.hero .sky::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,
    rgba(15,6,40,0) 0%,
    rgba(15,6,40,0) 55%,
    rgba(15,6,40,.4) 80%,
    rgba(15,6,40,1) 100%);
  pointer-events:none;
}
/* Couche 2 — contenu central */
.hero-inner{
  position:relative;
  z-index:3;
  text-align:center;
  padding:70px 24px 80px;
  max-width:1100px;
  margin:0 auto;
  width:100%;
}
/* Bandeaux texte (date au-dessus, lieu en-dessous) — même largeur que le logo */
.strip-text{
  display:block;
  width:min(41vw,410px);
  height:auto;
  margin:0 auto;
}
.strip-text.top{margin-bottom:6px}
.strip-text.bottom{margin-top:6px}
/* Logo FDP en jaune — filtre SVG qui prend l'alpha du PNG noir et la remplit en jaune */
.logo-fdp{
  display:block;
  width:min(41vw,410px);
  height:auto;
  margin:0 auto;
  filter:url(#recolor-yellow);
}
/* Jeu intégré directement dans le hero */
.game-embed{
  margin:36px auto 0;
  width:100%;
  max-width:720px;
  aspect-ratio:16 / 9;
  border-radius:14px;
  overflow:hidden;
  background:#0d0014;
  box-shadow:0 25px 70px rgba(0,0,0,.55),0 0 0 1px rgba(255,201,60,.25);
  position:relative;
  z-index:5;
}
.game-embed iframe{width:100%;height:100%;display:block;border:0}
.game-tip{
  margin-top:14px;
  font-size:13px;
  color:var(--lavender);
  opacity:.7;
  letter-spacing:.5px;
}
/* Liens de navigation minimalistes */
.nav-min{
  margin-top:30px;
  display:flex;
  gap:24px;
  justify-content:center;
  flex-wrap:wrap;
  font-size:13px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  font-weight:700;
}
.nav-min a{
  color:var(--cream);
  text-decoration:none;
  opacity:.7;
  transition:.2s;
  border-bottom:1px solid transparent;
  padding-bottom:2px;
}
.nav-min a:hover{opacity:1;color:var(--yellow);border-bottom-color:var(--yellow)}
/* Couche 3 — moules en bas-droite (mirroir), parallax */
.hero .moules{
  position:absolute;
  bottom:-3%;
  right:-3%;
  width:min(28vw,340px);
  aspect-ratio:1733 / 2600;
  background-image:url('assets/moules.png');
  background-size:contain;
  background-position:bottom right;
  background-repeat:no-repeat;
  z-index:2;
  will-change:transform;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,.5));
  transform:scaleX(-1);
  opacity:.85;
}
@media(max-width:700px){
  .hero .moules{width:38vw;opacity:.6}
  .hero-inner{padding:50px 18px 60px}
}

/* ============ FOOTER discret ============ */
.foot{
  padding:30px 24px 40px;
  text-align:center;
  font-size:12px;
  letter-spacing:1px;
  color:var(--lavender);
  opacity:.55;
}
.foot a{color:var(--lavender);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:1px}
.foot a:hover{color:var(--yellow);border-bottom-color:var(--yellow)}
.foot .sep{margin:0 10px;opacity:.5}

/* Respecte les préférences d'accessibilité */
@media (prefers-reduced-motion: reduce){
  .hero .sky,.hero .moules{transform:none !important;will-change:auto}
}
</style>
</head>
<body>

<!-- Filtre SVG qui colore le PNG noir en jaune (préserve l'alpha) -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="recolor-yellow" color-interpolation-filters="sRGB">
      <feFlood flood-color="#FFC93C"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
</svg>

<section class="hero">
  <div class="sky" aria-hidden="true"></div>
  <div class="hero-inner">
    <svg class="strip-text top" viewBox="0 0 100 14" preserveAspectRatio="xMidYMid meet" aria-label="08 août 2026">
      <text x="50" y="11.5" text-anchor="middle"
            textLength="100" lengthAdjust="spacing"
            font-family="'DK Longreach',sans-serif" font-size="13" fill="#FFC93C">08 AOÛT 2026</text>
    </svg>
    <img class="logo-fdp" src="assets/Logo-fdp.png" alt="FDP — Fête du Port">
    <svg class="strip-text bottom" viewBox="0 0 100 14" preserveAspectRatio="xMidYMid meet" aria-label="Pors Poulhan">
      <text x="50" y="11.5" text-anchor="middle"
            textLength="100" lengthAdjust="spacing"
            font-family="'DK Longreach',sans-serif" font-size="13" fill="#FFC93C">PORS POULHAN</text>
    </svg>
    <div class="game-embed">
      <iframe src="assets/moule-launcher.html" title="Moule Launcher" loading="lazy" allow="autoplay" allowfullscreen></iframe>
    </div>
    <p class="game-tip">Maintiens pour charger · relâche pour lancer</p>
    <nav class="nav-min">
      <a href="programme.html">Programme</a>
      <a href="infos.html">Infos pratiques</a>
      <a href="asso.html">L'asso</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
  <div class="moules" aria-hidden="true"></div>
</section>

<footer class="foot">
  <a href="mailto:lassoduport@gmail.com">lassoduport@gmail.com</a>
  <span class="sep">·</span>
  <a href="https://instagram.com/lassoduport" target="_blank" rel="noopener">@lassoduport</a>
  <span class="sep">·</span>
  L'asso du Port — Pors-Poulhan
</footer>

<script>
// Parallax léger sur le hero — le ciel scrolle plus lentement, les moules plus vite
(function(){
  const sky = document.querySelector('.hero .sky');
  const moules = document.querySelector('.hero .moules');
  if (!sky || !moules) return;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) return;

  let ticking = false;
  function update(){
    const y = window.scrollY;
    sky.style.transform = 'translate3d(0,' + (y * 0.45) + 'px,0)';
    moules.style.transform = 'scaleX(-1) translate3d(0,' + (y * -0.18) + 'px,0)';
    ticking = false;
  }
  window.addEventListener('scroll', function(){
    if (!ticking){ requestAnimationFrame(update); ticking = true; }
  }, { passive: true });
  update();
})();
</script>

</body>
</html>
