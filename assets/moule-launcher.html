<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0d0014;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;overflow:hidden;touch-action:none;}
#wrap{position:relative;width:min(100vw,calc(100vh*16/9));height:min(100vh,calc(100vw*9/16));max-width:710px;max-height:400px;}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated;border:2px solid #6b21a8;box-shadow:0 0 30px #c026d355;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,0,20,0.93);gap:10px;padding:18px;z-index:20;overflow-y:auto;}
@media(max-height:300px){.screen{justify-content:flex-start;padding:10px;gap:6px}}
.screen.hidden{display:none;}
.hidden{display:none !important;}
h1{font-size:clamp(13px,3.5vw,20px);color:#f0abfc;text-align:center;text-shadow:3px 3px #6b21a8,0 0 18px #c026d3;line-height:1.7;}
.sub{font-size:clamp(5px,1.5vw,8px);color:#d8b4fe;text-align:center;line-height:2.2;}
.big{font-size:clamp(9px,2.5vw,14px);color:#ffd700;text-shadow:0 0 10px #ffd700;text-align:center;}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,10px);padding:10px 18px;background:#6b21a8;color:#fff;border:2px solid #f0abfc;cursor:pointer;animation:blink 1s step-end infinite;}
.btn:active{background:#c026d3;animation:none;}
.btn-sm{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.4vw,8px);padding:6px 12px;background:#1e0030;color:#f0abfc;border:1px solid #6b21a8;cursor:pointer;}
.btn-sm:active{background:#6b21a8;}
input[type=text]{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.8vw,10px);padding:8px;background:#1e0030;color:#f0abfc;border:2px solid #6b21a8;outline:none;width:min(180px,60%);text-align:center;}
input[type=text]::placeholder{color:#7c3f9e;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.fdp{background:rgba(107,33,168,.2);border:1px solid #6b21a8;padding:8px 14px;width:100%;text-align:center;}
.fdp p{font-size:clamp(5px,1.4vw,7px);color:#f0abfc;line-height:2.1;}
.fdp .art{font-size:clamp(5px,1.5vw,8px);color:#ffd700;line-height:2.3;}
.lb-table{width:100%;border-collapse:collapse;font-size:clamp(5px,1.3vw,7px);color:#f0abfc;}
.lb-table th{color:#ffd700;padding:3px 5px;border-bottom:1px solid #6b21a8;}
.lb-table td{padding:4px 5px;border-bottom:1px solid #2a004a;}
.lb-table tr.me td{color:#fff;background:#2a004a;}
.rank-gold{color:#ffd700}.rank-silver{color:#c0c0c0}.rank-bronze{color:#cd7f32}
.loader{font-size:6px;color:#7c3f9e;animation:blink .6s step-end infinite;}
</style>

<script>
// ══════ SUPABASE ══════
var SB_URL='https://nhsroymqvwrjflagzznz.supabase.co/rest/v1';
var SB_KEY='sb_publishable_UH528FgC5FVbxNFYi9Odlg_jcPZuK4J';
var MAX_SCORE=9020; // borne théorique (anti-triche) — étendue à 9020m
var MIN_PLAY_MS=5000; // durée minimale d'une partie valide
var MIN_ACTIONS=1;

function sbHeaders(extra){
  var h={apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY};
  if(extra)for(var k in extra)h[k]=extra[k];
  return h;
}

// ══════ SESSION (anti-triche) ══════
var sessionToken=null;
var sessionStartTime=0;
var actionCount=0;

function newSession(){
  // UUID v4 simple
  sessionToken='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);
  });
  sessionStartTime=Date.now();
  actionCount=0;
}
function trackAction(){actionCount++;}

// ══════ SCORES ══════
var lastScoreId=null; // id de la dernière partie pour ajouter l'insta après coup

function loadScores(){
  return fetch(SB_URL+'/scores?select=name,score&order=score.desc&limit=10',{headers:sbHeaders()})
    .then(function(r){return r.json();})
    .catch(function(){return[];});
}

// Charge le top 3 pour afficher leurs squelettes en jeu
var topScores=[]; // [{name, score, wx}, ...]
var topScore=null; // alias pour le 1er (utilisé par checkBeatTop)
function loadTopScore(){
  return fetch(SB_URL+'/scores?select=name,score&order=score.desc&limit=3',{headers:sbHeaders()})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data&&data.length){
        topScores=data.map(function(d){
          return{name:d.name,score:d.score,wx:d.score*METERS+CRAB_WX};
        });
        topScore=topScores[0]; // pour le check de "record battu"
      }
    })
    .catch(function(){});
}

function saveScore(name,dist){
  // Anti-triche : on valide tout côté client AVANT d'envoyer
  if(!sessionToken){console.warn('No session');return Promise.resolve(null);}
  var playTime=Date.now()-sessionStartTime;
  if(playTime<MIN_PLAY_MS){console.warn('Partie trop courte: '+playTime+'ms');return Promise.resolve(null);}
  if(dist<0||dist>MAX_SCORE){console.warn('Score hors limites: '+dist);return Promise.resolve(null);}
  if(actionCount<MIN_ACTIONS){console.warn('Pas assez d\'actions');return Promise.resolve(null);}

  var body={
    name:name.toUpperCase().slice(0,12),
    score:dist,
    insta:null, // Pas d'insta à la sauvegarde initiale
    session_id:sessionToken,
    play_time_ms:playTime,
    action_count:actionCount
  };

  return fetch(SB_URL+'/scores',{
    method:'POST',
    headers:sbHeaders({'Content-Type':'application/json','Prefer':'return=representation'}),
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(data){
    sessionToken=null; // empêche double soumission
    if(data&&data[0]&&data[0].id){lastScoreId=data[0].id;}
    loadCount();
    loadTopScore(); // refresh du record en cas de nouveau champion
    return data&&data[0]?data[0]:null;
  }).catch(function(e){console.warn('Score save failed:',e);return null;});
}

function updateInsta(insta){
  if(!lastScoreId)return Promise.resolve();
  if(insta.charAt(0)==='@')insta=insta.substring(1);
  insta=insta.trim().slice(0,30);
  if(!insta)return Promise.resolve();
  return fetch(SB_URL+'/scores?id=eq.'+lastScoreId,{
    method:'PATCH',
    headers:sbHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}),
    body:JSON.stringify({insta:insta})
  }).then(function(){
    lastScoreId=null; // une seule mise à jour possible
  }).catch(function(e){console.warn('Insta update failed:',e);});
}

// Vérifie si le score qualifie pour le top 10 et révèle l'input insta
function checkTop10AndRevealInsta(){
  loadScores().then(function(scores){
    if(!scores)return;
    var qualifies=false;
    if(scores.length<10){qualifies=true;} // moins de 10 scores : automatique
    else{qualifies=M.dist>=scores[scores.length-1].score;}
    if(qualifies){
      var box=document.getElementById('topInstaBox');
      if(box)box.classList.remove('hidden');
    }
  });
}

// ══════ COMPTEUR (auto = nombre de lignes en base) ══════
var totalGames=0;
function loadCount(){
  return fetch(SB_URL+'/scores?select=*',{
    method:'HEAD',
    headers:sbHeaders({'Prefer':'count=exact','Range':'0-0'})
  }).then(function(r){
    var range=r.headers.get('content-range');
    if(range){
      var m=range.match(/\/(\d+)/);
      if(m)totalGames=parseInt(m[1]);
    }
    updateCountDisplay();
  }).catch(function(){});
}
function updateCountDisplay(){
  var el=document.getElementById('gameCount');
  if(el)el.textContent=totalGames+' PARTIES JOUÉES';
}

// ══════ AUDIO ══════
var ac=null,masterGain=null,bgmPlaying=false,bgmTimer=null;
var melIdx=0,cntIdx=0,bassIdx=0,drumIdx=0,arpIdx=0;
var melT=0,cntT=0,bassT=0,drumT=0,arpT=0;

var BASE_VOL=0.45;
function getAC(){if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();masterGain=ac.createGain();masterGain.gain.value=BASE_VOL;masterGain.connect(ac.destination);}return ac;}

var N={
  C2:65.4,A2:110,B2:123.5,
  C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
  C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
  C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,
  Bb4:466.2,Ab4:415.3,Gb4:370,Eb4:311.1,
  Eb5:622.3,Gb5:740,Ab5:830.6,
  _:0
};
var BPM=168,BASE_BEAT=60/BPM,BEAT=BASE_BEAT;
// === MÉTÉO ALÉATOIRE (1 partie sur 5) ===
var weather='normal'; // 'normal' | 'storm' | 'fog' | 'aurora_intense'
var stormFlashT=0;
function pickWeather(){
  if(Math.random()<0.20){
    weather=['storm','fog','aurora_intense'][Math.floor(Math.random()*3)];
  } else {
    weather='normal';
  }
  stormFlashT=0;
}

// === COMBO FLASHES & DISTORTION (x6/x7/x8) ===
var comboFlash=0;       // alpha actuel du flash
var comboFlashPeak=0;   // intensité du flash (0-1)
function triggerComboFlash(intensity){
  comboFlash=1.0;
  comboFlashPeak=intensity;
}

// === MÉTÉOR MODE (combo x5+) ===
var slowMoActive=false;
var timeScale=1;
var slowMoEntryFlash=0;
function setSlowMo(active){
  if(active===slowMoActive)return;
  slowMoActive=active;
  // Plus de slow mo réel : on garde uniquement les visuels météor + musique 2x
  timeScale=1;
  BEAT=active?BASE_BEAT*0.5:BASE_BEAT; // musique 2x plus rapide pendant le mode météor
  if(active)slowMoEntryFlash=18; // flash écran à l'activation
}

// Mélodie originale FDP — composée pour le jeu (A mineur / C majeur, esprit "vague océanique")
// 100% originale, aucune référence à un thème existant
var MELODY=[
  // Phrase A : ondulation introductive (vagues qui montent)
  [N.A4,.5],[N.C5,.5],[N.E5,.5],[N.D5,.5],
  [N.A4,.5],[N.C5,.5],[N.E5,.5],[N.F5,.5],
  // Phrase B : descente (vagues qui retombent)
  [N.G5,.5],[N.E5,.5],[N.D5,.5],[N.C5,.5],
  [N.A4,.5],[N.C5,.5],[N.D5,.5],[N.E5,.5],
  // Phrase C : gamme ascendante puis descendante
  [N.C5,.25],[N.D5,.25],[N.E5,.25],[N.F5,.25],[N.G5,.5],[N.A5,.5],
  [N.G5,.25],[N.F5,.25],[N.E5,.25],[N.D5,.25],[N.C5,.5],[N.E5,.5],
  // Phrase D : climax
  [N.A5,.5],[N.G5,.5],[N.E5,.5],[N.C5,.5],
  [N.D5,.5],[N.E5,.5],[N.G5,1],
  // Phrase E : variation rythmique
  [N.E5,.25],[N.D5,.25],[N.C5,.25],[N.D5,.25],[N.E5,.5],[N.G5,.5],
  [N.A5,.25],[N.G5,.25],[N.F5,.25],[N.E5,.25],[N.D5,.5],[N.C5,.5],
  // Phrase F : reprise du motif
  [N.C5,.5],[N.E5,.5],[N.G5,.5],[N.A5,.5],
  [N.G5,.5],[N.E5,.5],[N.D5,.5],[N.C5,.5],
  // Phrase G : ascension finale
  [N.G4,.25],[N.A4,.25],[N.C5,.5],[N.E5,.5],[N.A5,.5],
  [N.G5,.25],[N.E5,.25],[N.D5,.25],[N.C5,.25],[N.A4,.5],
  // Phrase H : outro
  [N._,.5],[N.E5,.5],[N.D5,.5],[N.C5,.5],
  [N.A4,1],[N._,1],
];
var COUNTER=[
  [N.C4,2],[N.G3,2],[N.E4,1],[N.C4,1],[N.G3,2],
  [N.A3,2],[N.E4,2],[N.F4,2],[N.C4,2],
  [N.G4,1],[N.D4,1],[N.B3,2],[N.C4,2],[N.G3,2],
  [N.A3,2],[N.E3,2],[N.F3,2],[N.C4,2],
];
var BASS=[
  [N.C3,.5],[N._,.25],[N.C3,.25],[N.G3,.5],[N._,.5],
  [N.C3,.5],[N._,.25],[N.E3,.25],[N.G3,.5],[N._,.5],
  [N.A2,.5],[N._,.25],[N.A2,.25],[N.E3,.5],[N._,.5],
  [N.F2,.5],[N._,.25],[N.A2,.25],[N.C3,.5],[N._,.5],
  [N.G2,.5],[N._,.25],[N.B2,.25],[N.D3,.5],[N._,.5],
  [N.C3,.5],[N._,.25],[N.G2,.25],[N.E3,.5],[N._,.5],
  [N.F2,.5],[N._,.25],[N.C3,.25],[N.A2,.5],[N._,.5],
  [N.G2,.5],[N._,.25],[N.D3,.25],[N.B2,.5],[N._,.5],
];
var ARP=[
  [N.C5,.25],[N.E5,.25],[N.G5,.25],[N._,.25],
  [N.C5,.25],[N.G4,.25],[N.E5,.25],[N._,.25],
  [N.A4,.25],[N.E5,.25],[N.A5,.25],[N._,.25],
  [N.F4,.25],[N.C5,.25],[N.F5,.25],[N._,.25],
  [N.G4,.25],[N.D5,.25],[N.G5,.25],[N._,.25],
  [N.G4,.25],[N.B4,.25],[N.D5,.25],[N._,.25],
  [N.C4,.25],[N.E4,.25],[N.G4,.25],[N._,.25],
  [N.C4,.25],[N.G4,.25],[N.E5,.25],[N._,.25],
];
var DRUMS=[
  {t:'k',d:.5},{t:'h',d:.25},{t:'h',d:.25},
  {t:'s',d:.5},{t:'h',d:.25},{t:'h',d:.25},
  {t:'k',d:.25},{t:'k',d:.25},{t:'h',d:.25},{t:'h',d:.25},
  {t:'s',d:.5},{t:'h',d:.25},{t:'oh',d:.25},
];

function oscNote(freq,start,dur,type,vol){
  if(!freq)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(masterGain);
  o.type=type||'square';o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol||0.18,start+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur-0.02);
  o.start(start);o.stop(start+dur);
}
function noiseHit(start,dur,freq,vol){
  var buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  var src=ac.createBufferSource();src.buffer=buf;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=freq||200;f.Q.value=0.5;
  var g=ac.createGain();src.connect(f);f.connect(g);g.connect(masterGain);
  g.gain.setValueAtTime(vol||0.3,start);g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  src.start(start);src.stop(start+dur);
}

function scheduleBGM(){
  if(!bgmPlaying)return;
  var now=ac.currentTime,LA=0.25;
  while(melT<now+LA){var n=MELODY[melIdx%MELODY.length],d=n[1]*BEAT;oscNote(n[0],melT,d,'square',0.18);melT+=d;melIdx++;}
  while(cntT<now+LA){var n=COUNTER[cntIdx%COUNTER.length],d=n[1]*BEAT;oscNote(n[0],cntT,d,'triangle',0.10);cntT+=d;cntIdx++;}
  while(bassT<now+LA){var n=BASS[bassIdx%BASS.length],d=n[1]*BEAT;oscNote(n[0],bassT,d,'square',0.20);bassT+=d;bassIdx++;}
  while(arpT<now+LA){var n=ARP[arpIdx%ARP.length],d=n[1]*BEAT;oscNote(n[0],arpT,d,'triangle',0.07);arpT+=d;arpIdx++;}
  while(drumT<now+LA){
    var n=DRUMS[drumIdx%DRUMS.length],d=n.d*BEAT;
    if(n.t==='k'){noiseHit(drumT,d*.8,70,0.32);oscNote(75,drumT,d*.25,'sine',0.18);}
    if(n.t==='s'){noiseHit(drumT,d*.5,1400,0.20);}
    if(n.t==='h'){noiseHit(drumT,d*.25,9000,0.07);}
    if(n.t==='oh'){noiseHit(drumT,d*.6,9000,0.10);}
    drumT+=d;drumIdx++;
  }
  bgmTimer=setTimeout(scheduleBGM,60);
}
function startBGM(){
  getAC();if(ac.state==='suspended')ac.resume();
  if(bgmPlaying)return;bgmPlaying=true;
  var now=ac.currentTime+0.05;
  melT=now;cntT=now;bassT=now;drumT=now;arpT=now;
  melIdx=0;cntIdx=0;bassIdx=0;drumIdx=0;arpIdx=0;
  scheduleBGM();
}
function stopBGM(){bgmPlaying=false;clearTimeout(bgmTimer);}

function sfxLaunch(){oscNote(80,ac.currentTime,.2,'square',.2);oscNote(250,ac.currentTime+.06,.1,'sawtooth',.14);[400,650,950].forEach(function(f,i){oscNote(f,ac.currentTime+.1+i*.04,.07,'square',.1);});}
function sfxBounce(){oscNote(220,ac.currentTime,.06,'square',.07);}
function sfxSplash(){oscNote(100,ac.currentTime,.16,'sawtooth',.11);oscNote(70,ac.currentTime+.08,.2,'square',.07);}
function sfxFDP(){[523,659,784,1047,784,1319].forEach(function(f,i){oscNote(f,ac.currentTime+i*.07,.09,'square',.16);});}
function sfxGull(){oscNote(800,ac.currentTime,.08,'square',.08);oscNote(600,ac.currentTime+.05,.1,'sawtooth',.06);}
function sfxCharge(){oscNote(80,ac.currentTime,.05,'sawtooth',.04);}
// Explosion sourde (combo x6+) — boum basse fréquence + crack
function sfxExplosion(){
  if(!ac)return;
  var t=ac.currentTime;
  oscNote(55,t,0.45,'sine',0.42);
  oscNote(90,t,0.35,'sawtooth',0.32);
  oscNote(180,t+0.02,0.10,'square',0.22);
  noiseHit(t,0.55,110,0.42);
  noiseHit(t+0.05,0.30,320,0.22);
}
// Entrée météore (combo x7+) — rugissement basse + sifflement descendant
function sfxMeteor(){
  if(!ac)return;
  var t=ac.currentTime;
  // Rugissement basse fréquence soutenu
  noiseHit(t,1.4,80,0.38);
  noiseHit(t+0.05,1.3,200,0.22);
  // Sifflement descendant style atmosphère qui chauffe
  for(var i=0;i<14;i++){
    var f=1600-i*95;
    oscNote(f,t+i*0.07,0.14,'sawtooth',0.07);
  }
  // Impact final
  oscNote(42,t+0.95,0.45,'sine',0.32);
  noiseHit(t+0.95,0.55,140,0.30);
}

// ══════ CANVAS ══════
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W=710,H=400;
var bgT=0,gameT=0;

// ══════ TEXTURE GRAIN (effet papier/CRT comme l'affiche) ══════
var grainTex=(function(){
  var g=document.createElement('canvas');
  g.width=W;g.height=H;
  var gx=g.getContext('2d');
  var imd=gx.createImageData(W,H);
  var d=imd.data;
  for(var i=0;i<d.length;i+=4){
    // Grain mixte gris + légères touches couleurs (comme un risographe / vieille TV)
    var r=Math.random();
    var v=Math.floor(r*180);
    if(r<0.05){d[i]=180;d[i+1]=140;d[i+2]=200;}      // grain rose/violet (très rare)
    else if(r<0.10){d[i]=200;d[i+1]=180;d[i+2]=100;} // grain jaune (très rare)
    else{d[i]=v;d[i+1]=v;d[i+2]=v;}                  // gris dominant
    d[i+3]=Math.floor(38+Math.random()*30); // alpha 38-68 = ~15% effectif avec overlay
  }
  gx.putImageData(imd,0,0);
  return g;
})();
function drawGrain(){
  ctx.globalCompositeOperation='overlay';
  ctx.drawImage(grainTex,0,0);
  ctx.globalCompositeOperation='source-over';
}

// ══════ WORLD ══════
var METERS=13,SHORE=650,GY=300,SY=314;
var GRAVITY=0.176,LAUNCH_SPD=17.6;
var VX_CAP=70; // vitesse horizontale maximale (anti-décollage)
var FINISH_WX=65130,CELEBRATE_WX=65130,WORLD_END=120000;
var CELEBRATE_END_WX=78260; // fin de la zone célébration (panneau "MAX 6000m" hommage)
var SQUELETTE_WX=78130; // position des squelettes top 3 (~6010m)

function px(cx,cy,x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(cx+x,cy+y,w,h);}

// ══════ CRABE ══════
var CRAB_WX=130,CRAB_SY=GY;
var ARM_LEN=60,ARM_LO=200*Math.PI/180,ARM_HI=108*Math.PI/180,armAngle=ARM_LO;
var PIVOT_OX=-20,PIVOT_OY=-10;
function getPivot(){return{x:CRAB_WX+PIVOT_OX,y:CRAB_SY+PIVOT_OY};}
function getTipWorld(){var p=getPivot();return{wx:p.x+Math.cos(armAngle)*ARM_LEN,wy:p.y+Math.sin(armAngle)*ARM_LEN};}
function getLaunchVec(){
  var chargeP=Math.min(armT,1);
  var spd=LAUNCH_SPD*(0.5+0.5*chargeP)*2.5;
  return{vx:-Math.cos(armAngle)*spd,vy:-Math.sin(armAngle)*spd};
}

function drawCrab(holding){
  var cx=toSX(CRAB_WX),cy=CRAB_SY,s=4;
  var lo=Math.floor(gameT/14)%2===0?s:0;
  // Pattes — 4 de chaque côté
  var legLX=[[-s*9,s*4],[-s*8,s*4],[-s*7,s*4],[-s*6,s*4]];
  var legH=[s*4,s*3+lo,s*3,s*3+lo];
  for(var i=0;i<4;i++){px(cx,cy,legLX[i][0],legLX[i][1],s,legH[i],'#b02808');}
  var legRX=[[s*5,s*4],[s*6,s*4],[s*7,s*4],[s*8,s*4]];
  for(var i=0;i<4;i++){px(cx,cy,legRX[i][0],legRX[i][1],s,legH[i],'#b02808');}
  // Corps en V — large en haut, étroit en bas
  px(cx,cy,-s*2,s*2,s*4,s*2,'#901808'); // ventre étroit
  px(cx,cy,-s*3,0,s*6,s*3,'#b02010');   // milieu
  px(cx,cy,-s*5,-s*2,s*10,s*3,'#c82808'); // haut large
  px(cx,cy,-s*6,-s*3,s*3,s*2,'#c02808'); // épaule gauche
  px(cx,cy,s*3,-s*3,s*3,s*2,'#c02808');  // épaule droite
  px(cx,cy,-s*3,-s*3,s*6,s*2,'#e03010'); // carapace bombée
  px(cx,cy,-s*2,-s*4,s*4,s,'#f04020');
  px(cx,cy,-s,-s*5,s*2,s,'#ff5530');
  // Reflets
  px(cx,cy,-s*4,-s*2,s,s*2,'#d02808');
  px(cx,cy,s*3,-s*2,s,s*2,'#d02808');
  // Tiges yeux
  px(cx,cy,-s*2,-s*7,s,s*3,'#c02808');
  px(cx,cy,s,-s*7,s,s*3,'#c02808');
  // Yeux
  px(cx,cy,-s*3,-s*9,s*3,s*3,'#0a0a0a');
  px(cx,cy,s,-s*9,s*3,s*3,'#0a0a0a');
  px(cx,cy,-s*3,-s*9,s,s,'#fff');
  px(cx,cy,s,-s*9,s,s,'#fff');
  // Bras pince droite (catapulte) — part vers la droite
  var p=getPivot(),psx=toSX(p.x),psy=p.y,AL=ARM_LEN;
  ctx.save();ctx.translate(psx,psy);ctx.rotate(armAngle);
  px(0,0,0,-s,AL,s*2,'#c82e08');px(0,0,0,-s,s*2,s*2,'#902008');
  px(0,0,AL,-s*2,s*2,s*4,'#c02808');
  px(0,0,AL+s*2,-s*3,s*4,s,'#e04010');
  px(0,0,AL+s*2,-s*2,s*4,s,'#e84818');
  px(0,0,AL+s*2,s,s*4,s,'#a02008');
  px(0,0,AL+s*3,s*2,s*3,s,'#881808');
  if(holding){ctx.save();ctx.translate(AL+s*4,0);ctx.rotate(-armAngle);drawMussel(0,0,.7);ctx.restore();}
  ctx.restore();
  // Grosse pince fixe — à droite du corps, s'étend vers la droite (un crabe a une pince de chaque côté)
  var lpsx=toSX(CRAB_WX+s*4);var lpsy=CRAB_SY-s*2;
  ctx.save();ctx.translate(lpsx,lpsy);
  px(0,0,0,-s,AL*.8,s*2,'#c02808'); // bras
  px(0,0,AL*.8,-s*2,s*2,s*4,'#b82008'); // coude
  px(0,0,AL*.8+s*2,-s*3,s*4,s,'#d03010'); // mâchoire sup
  px(0,0,AL*.8+s*2,s,s*4,s,'#d03010');   // mâchoire inf
  px(0,0,AL*.8+s*5,-s*4,s*2,s,'#e04020'); // bout sup
  px(0,0,AL*.8+s*5,s*2,s*2,s,'#e04020'); // bout inf
  ctx.restore();
  // Pivot bras
  ctx.fillStyle='#e04818';ctx.beginPath();ctx.arc(psx,psy,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff8030';ctx.beginPath();ctx.arc(psx,psy,3,0,Math.PI*2);ctx.fill();
}

// ══════ MOULE ══════
function drawMussel(cx,cy,sc){
  var s=Math.max(1,Math.round(8*(sc||1)));
  // Corps — pointu bas, arrondi haut
  px(cx,cy,-s,   -s*5, s*2, s,  '#1a1448');
  px(cx,cy,-(s*1.5|0),-s*4, s*3, s, '#201850');
  px(cx,cy,-(s*1.5|0),-s*3, s*3, s, '#241c58');
  px(cx,cy,-(s*1.5|0),-s*2, s*3, s, '#201850');
  px(cx,cy,-s,   -s,   s*2, s,  '#1c1548');
  px(cx,cy,-(s*.5|0), 0, s, s,  '#161240');
  px(cx,cy,-(s*.3|0), s, Math.max(1,s*.6|0), Math.max(1,s*.7|0),'#100e38');
  // Reflet nacré gauche
  px(cx,cy,-(s*1.5|0),-s*4, Math.max(1,s*.8|0),s*4,'rgba(192,38,211,.55)');
  px(cx,cy,-(s*1.5|0),-s*5, s, s, 'rgba(240,171,252,.3)');
  // Nervure droite
  px(cx,cy,(s*.5|0),-s*4, Math.max(1,s*.5|0),s*4,'#0c0a20');
  // Œil unique centré — petit, pas content
  var es=Math.max(1,s*.55|0);
  px(cx,cy,-(s*.8|0),-s*3.5|0, s*1.6|0, es*2, '#dde0f0');
  px(cx,cy,-(s*.5|0),(-s*3.2)|0, s, es*2, '#080610');
  px(cx,cy,-(s*.5|0),(-s*3.2)|0, Math.max(1,s*.35|0), Math.max(1,es*.7|0), '#fff');
  // Sourcil froncé incliné
  px(cx,cy,-(s*.9|0),(-s*4)|0, Math.max(1,s*.9|0), Math.max(1,es*.6|0),'#0a0820');
  px(cx,cy,-(s*.1|0),(-s*3.7)|0, Math.max(1,s*.8|0), Math.max(1,es*.6|0),'#0a0820');
  // Bouche mécontente
  px(cx,cy,-(s*.7|0),(-s*1.5)|0, s*1.4|0, Math.max(1,es*.5|0),'#0a0820');
  px(cx,cy,-(s*.8|0),(-s*1.2)|0, Math.max(1,s*.4|0), Math.max(1,es*.6|0),'#0a0820');
  px(cx,cy,(s*.4|0), (-s*1.2)|0, Math.max(1,s*.4|0), Math.max(1,es*.6|0),'#0a0820');
}
function drawMusselFlying(wx2,sy,angle){
  var sx=toSX(wx2);

  if(slowMoActive){
    // 2. HALO DE CHALEUR (rouge-orange pulsant, autour de la moule — météor effect)
    var pulseR=24+Math.sin(bgT*12)*4;
    var hg=ctx.createRadialGradient(sx,sy,0,sx,sy,pulseR);
    hg.addColorStop(0,'rgba(255,180,60,0.55)');
    hg.addColorStop(0.4,'rgba(255,80,20,0.35)');
    hg.addColorStop(1,'rgba(255,30,0,0)');
    ctx.fillStyle=hg;
    ctx.beginPath();ctx.arc(sx,sy,pulseR,0,Math.PI*2);ctx.fill();

    // 3. CŒUR INCANDESCENT (blanc-jaune au centre)
    var coreR=10+Math.sin(bgT*20)*1.5;
    var cg=ctx.createRadialGradient(sx,sy,0,sx,sy,coreR);
    cg.addColorStop(0,'rgba(255,255,230,0.85)');
    cg.addColorStop(0.6,'rgba(255,220,100,0.5)');
    cg.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.arc(sx,sy,coreR,0,Math.PI*2);ctx.fill();
  }

  // 4. LA MOULE (avec teinte feu si slow mo)
  ctx.save();
  ctx.translate(sx,sy);
  ctx.rotate(angle);
  drawMussel(0,0,1);
  if(slowMoActive){
    // Teinte rouge-orange par-dessus (métal en fusion)
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='rgba(255,130,40,0.35)';
    ctx.fillRect(-10,-30,20,40);
    ctx.fillStyle='rgba(255,220,100,0.2)';
    ctx.fillRect(-8,-28,16,36);
    ctx.globalCompositeOperation='source-over';
  }
  ctx.restore();
}

// === PARTICULES FEU / MÉTÉOR (en slow mo) ===
var fireParticles=[];
function spawnFire(){
  // 1. Cœur blanc-incandescent (juste autour de la moule)
  for(var i=0;i<2;i++){
    fireParticles.push({
      wx:M.wx+(Math.random()-.5)*6,
      wy:M.wy+(Math.random()-.5)*6,
      vx:-M.vx*0.03+(Math.random()-.5)*1,
      vy:(Math.random()-.5)*0.5,
      life:0.6,sz:3+Math.random()*2,
      col:'#ffffff',type:'core'
    });
  }
  // 2. Flammes jaunes/orange (traînée principale)
  for(var i=0;i<5;i++){
    fireParticles.push({
      wx:M.wx-(Math.random()*4),
      wy:M.wy+(Math.random()-.5)*10,
      vx:-M.vx*0.08+(Math.random()-.5)*1.5,
      vy:-Math.random()*1.5-.3,
      life:1,sz:3+Math.random()*5,
      col:Math.random()<.35?'#ffec80':Math.random()<.65?'#ff9020':'#ff4030',
      type:'flame'
    });
  }
  // 3. Sparks (étincelles blanches qui giclent dans toutes directions)
  if(Math.random()<.85){
    for(var k=0;k<2;k++){
      var ang=Math.random()*Math.PI*2;
      var spd=2+Math.random()*5;
      fireParticles.push({
        wx:M.wx,wy:M.wy,
        vx:Math.cos(ang)*spd-M.vx*0.05,
        vy:Math.sin(ang)*spd-Math.abs(M.vy)*0.05,
        life:0.7,sz:1.5+Math.random()*0.8,
        col:Math.random()<.5?'#ffffff':'#ffec80',
        type:'spark'
      });
    }
  }
  // 4. Fumée sombre derrière (trace longue)
  if(Math.random()<.6){
    fireParticles.push({
      wx:M.wx-Math.random()*8,
      wy:M.wy+(Math.random()-.5)*14,
      vx:-M.vx*0.02+(Math.random()-.5)*0.5,
      vy:-Math.random()*0.6,
      life:1.4,sz:5+Math.random()*5,
      col:'rgba(80,40,40,0.5)',
      type:'smoke'
    });
  }
}
function updateFireParticles(){
  for(var i=fireParticles.length-1;i>=0;i--){
    var p=fireParticles[i];
    p.wx+=p.vx;p.wy+=p.vy;
    if(p.type==='smoke'){p.vy-=0.02;p.sz*=1.015;p.life-=0.018;}
    else if(p.type==='spark'){p.vy+=0.12;p.life-=0.05;p.sz*=0.99;}
    else{p.vy+=0.05;p.life-=0.04;p.sz*=0.96;}
    if(p.life<=0||p.sz<.4)fireParticles.splice(i,1);
  }
}
function drawFireParticles(){
  // Smoke d'abord (en fond), puis flames/core (devant), puis sparks (au-dessus)
  ['smoke','flame','core','spark'].forEach(function(type){
    fireParticles.forEach(function(p){
      if(p.type!==type)return;
      var sx=toSX(p.wx);
      if(sx<-20||sx>W+20)return;
      ctx.globalAlpha=Math.min(p.life,1);
      ctx.fillStyle=p.col;
      ctx.fillRect(sx-p.sz/2,p.wy-p.sz/2,p.sz,p.sz);
    });
  });
  ctx.globalAlpha=1;
}

for(var ci=0;ci<24;ci++)CLOUDS.push({x:Math.random()*CLOUD_LOOP,y:15+Math.random()*70,spd:0.005+Math.random()*0.015,w:55+Math.random()*90,h:12+Math.random()*16});
var BUOYS=[{x:900,ph:0},{x:1800,ph:1.4},{x:2900,ph:2.1},{x:4100,ph:.8},{x:5600,ph:1.7},{x:7200,ph:1.1},{x:9000,ph:.5},{x:11000,ph:2.0},{x:13000,ph:1.3},{x:20000,ph:.7},{x:30000,ph:1.8},{x:45000,ph:.4},{x:60000,ph:2.2}];

function lerpColor(c1,c2,t2){
  var r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  var r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return'rgb('+Math.round(r1+(r2-r1)*t2)+','+Math.round(g1+(g2-g1)*t2)+','+Math.round(b1+(b2-b1)*t2)+')';
}

function getSkyPalette(dist){
  if(dist<1000){
    // Coucher de soleil pink synthwave
    var p=dist/1000;
    return{top:lerpColor('#2D0E5C','#0d0014',p),mid:lerpColor('#E91E8D','#180028',p),bot:lerpColor('#FF7AC0','#2a0040',p),sea:lerpColor('#FF4D9B','#150026',p),starA:0,sunsetP:1-p,dawnP:0,astralP:0};
  }
  else if(dist<6000){
    // Nuit étoilée (étendue jusqu'à 6000m)
    return{top:'#0d0014',mid:'#180028',bot:'#2a0040',sea:'#150026',starA:1,sunsetP:0,dawnP:0,astralP:0};
  }
  else{
    // Zone astrale — espace profond, plus sombre, étoiles colorées
    var p=Math.min((dist-6000)/300,1); // transition courte de 300m
    return{top:lerpColor('#0d0014','#020008',p),mid:lerpColor('#180028','#06001a',p),bot:lerpColor('#2a0040','#0a002a',p),sea:lerpColor('#150026','#04000c',p),starA:1,sunsetP:0,dawnP:0,astralP:p};
  }
}

function drawCelestialPixel(dist,t2){
  var ps=4;
  if(dist<1000){
    // Soleil couchant
    var p=dist/1000;
    var sx2=Math.round((W*.78-p*W*.38)/ps)*ps;
    var sy2=Math.round((H*.5+p*H*.38)/ps)*ps;
    var sr=Math.max(2,7-Math.round(p*4));
    // Halo lumineux uniquement (pas de fillRect global)
    var gr=ctx.createRadialGradient(sx2,sy2,0,sx2,sy2,sr*ps*4);
    gr.addColorStop(0,'rgba(255,220,150,'+(.45-p*.35)+')');
    gr.addColorStop(.4,'rgba(255,80,160,'+(.22-p*.15)+')');
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(sx2-sr*ps*4,sy2-sr*ps*4,sr*ps*8,sr*ps*8);
    var cols=['#FFEC80','#FF9FD9','#FF4D9B'];
    ctx.globalAlpha=1-p*.8;
    for(var dy=-sr;dy<=sr;dy++)for(var dx=-sr;dx<=sr;dx++){if(dx*dx+dy*dy<=sr*sr){ctx.fillStyle=dx*dx+dy*dy<sr*.4*sr*.4?cols[0]:dx*dx+dy*dy<sr*.75*sr*.75?cols[1]:cols[2];ctx.fillRect(sx2+dx*ps,sy2+dy*ps,ps,ps);}}
    ctx.globalAlpha=1;
    if(p<.5){ctx.fillStyle='rgba(255,220,140,'+(.6-p*1.2)+')';[[0,-1],[1,-1],[-1,-1],[1,0],[-1,0],[0,1]].forEach(function(rd){for(var ri=1;ri<=2;ri++){ctx.fillRect(sx2+(sr+ri)*ps*rd[0],sy2+(sr+ri)*ps*rd[1],ps,ps);}});}
  } else if(dist<3500){
    // Lune — arc parabolique
    var moonA=dist<1200?(dist-800)/400:1;if(dist>3200)moonA=(3500-dist)/300;moonA=Math.max(0,Math.min(1,moonA));
    var pm=(dist-1000)/2500;
    var mx=Math.round((W*.85-pm*W*.72)/ps)*ps;
    var arc=4*pm*(1-pm);
    var my=Math.round((H*.82-arc*H*.72)/ps)*ps;
    var mr=4;
    var mg=ctx.createRadialGradient(mx,my,0,mx,my,mr*ps*3);
    mg.addColorStop(0,'rgba(200,200,255,'+moonA*.12+')');mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg;ctx.fillRect(mx-mr*ps*3,my-mr*ps*3,mr*ps*6,mr*ps*6);
    ctx.globalAlpha=moonA;
    for(var dy=-mr;dy<=mr;dy++)for(var dx=-mr;dx<=mr;dx++){if(dx*dx+dy*dy<=mr*mr){if(dx>1)continue;ctx.fillStyle=dx*dx+dy*dy<mr*.6*mr*.6?'#eeeedd':'#ddddc8';ctx.fillRect(mx+dx*ps,my+dy*ps,ps,ps);}}
    ctx.globalAlpha=moonA*.4;ctx.fillStyle='#bbbbaa';
    ctx.fillRect(mx-ps,my+ps,ps*2,ps);ctx.fillRect(mx-ps*2,my-ps*2,ps,ps);ctx.fillRect(mx+ps,my-ps,ps,ps);
    ctx.globalAlpha=1;
  } else {
    // Zone astrale — pas de soleil/lune, on dessine planètes et étoiles colorées plus loin
    drawAstralBodies(dist,t2,ps);
  }
}

// === DÉCOR ASTRAL ===
// Planètes positionnées dans le monde (avec parallax via leur wx)
var ASTRAL_BODIES=[
  {wx:80730, type:'saturn',  sy:H*0.25, size:7},   // ~6200m : Saturne (atteint dès l'entrée astrale)
  {wx:86730, type:'gasgiant',sy:H*0.18, size:9},   // ~6660m : géante gazeuse rose
  {wx:92930, type:'galaxy',  sy:H*0.30, size:34}   // ~7140m : galaxie spirale (juste avant fin atteinte)
];
function drawAstralBodies(dist,t2,ps){
  // Étoiles colorées supplémentaires en mode astral (sont déjà dessinées dans drawDecor)
  // On dessine ici uniquement les planètes/galaxies au passage
  ASTRAL_BODIES.forEach(function(b){
    var sx=toSX(b.wx);
    if(sx<-80||sx>W+80)return;
    var sy=b.sy+Math.sin(t2*0.04+b.wx*0.0001)*4;
    if(b.type==='saturn'){
      // Boule jaune
      var r=b.size*ps*.5;
      ctx.fillStyle='#ffd070';ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e0a040';ctx.beginPath();ctx.arc(sx,sy,r*.6,0,Math.PI*2);ctx.fill();
      // Anneaux
      ctx.strokeStyle='#a87030';ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(sx,sy,r*2,r*.5,0,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#c89058';ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(sx,sy,r*1.7,r*.4,0,0,Math.PI*2);ctx.stroke();
    } else if(b.type==='gasgiant'){
      // Géante rose avec bandes
      var r=b.size*ps*.5;
      ctx.fillStyle='#ff80c0';ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(192,38,211,.6)';
      for(var i=0;i<3;i++){
        var by=sy-r*.4+i*r*.4;
        ctx.fillRect(sx-r*.95,by,r*1.9,2);
      }
      ctx.fillStyle='rgba(255,160,200,.7)';
      ctx.beginPath();ctx.arc(sx-r*.3,sy-r*.3,r*.3,0,Math.PI*2);ctx.fill();
    } else if(b.type==='galaxy'){
      // Galaxie spirale (200 points en spirale)
      var rot=t2*0.03;
      ctx.globalAlpha=.85;
      for(var arm=0;arm<2;arm++){
        for(var i=0;i<70;i++){
          var ang=i*0.3+rot+arm*Math.PI;
          var rad=i*0.45;
          var alpha=Math.max(.1,1-i/70);
          ctx.fillStyle=arm===0?'rgba(240,171,252,'+alpha+')':'rgba(180,200,255,'+alpha+')';
          var sz=i<10?2:1;
          ctx.fillRect(sx+Math.cos(ang)*rad-sz/2,sy+Math.sin(ang)*rad-sz/2,sz,sz);
        }
      }
      // Cœur lumineux
      ctx.fillStyle='rgba(255,240,255,.8)';
      ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  });
}

// 1) PHARE de Pors-Poulhan — À GAUCHE DU CRABE (CRAB_WX=130), partiellement coupé
//    Toit du haut élargi à 9s (+15% vs version précédente à 7.8s)
//    Lumière ROUGE (signature visuelle d'un phare maritime breton)
function drawLighthouse(){
  var LX=-30; // à gauche du crabe — assumé partiellement coupé au lancement

  var sx=toSX(LX);
  if(sx<-160||sx>W+160)return;
  var cx=sx,cy=GY-2,s=12;
  var roofMauve='#9024b8',roofDark='#5c1880',roofLight='#c040d8';
  var wallWhite='#ede5d4',wallShade='#bcb4a0';
  var trimGrey='#5e5e5e';
  // Herbe/touffes au sommet de la falaise en ambre (pas de vert dans le jeu)
  var grassGreen='#a07840',grassDark='#6a4a20';
  var rockGrey='#6a5d50',rockDark='#4a3f35';
  // FALAISE / ROCHE sous le phare
  px(cx,cy,-s*7,-s*0.5,s*14,s*1.5,rockGrey);
  px(cx,cy,-s*6,s,s*12,s*0.7,rockDark);
  // Herbe verte au sommet de la falaise
  for(var i=0;i<6;i++){

  px(cx,cy,-s*3,-s*8,s*6,s*7,wallWhite);
  px(cx,cy,s*2,-s*8,s,s*7,wallShade); // ombre côté droit
  px(cx,cy,-s*3.5,-s*1,s*7,s*0.5,trimGrey); // trim sol
  // TOIT MAUVE — 2 rectangles
  // Rectangle BAS : 6s wide (collé sur le mur)
  px(cx,cy,-s*3,-s*9,s*6,s,roofMauve);
  // Rectangle HAUT : 8.1s wide × 1.2s tall (-10% width, +20% height vs version précédente)
  px(cx,cy,-s*4.05,-s*10.2,s*8.1,s*1.2,roofMauve);
  // Reflets / ombres effet 3D
  px(cx,cy,-s*3,-s*9,s*0.6,s,roofLight);
  px(cx,cy,-s*4.05,-s*10.2,s*0.7,s*1.2,roofLight);
  px(cx,cy,s*2.5,-s*9,s*0.5,s,roofDark);
  px(cx,cy,s*3.35,-s*10.2,s*0.7,s*1.2,roofDark);
  px(cx,cy,-s*4.05,-s*9.2,s*8.1,s*0.25,roofDark); // liseré sombre au rim du toit
  // Halo lumineux ROUGE — c'est un phare maritime, pas un lampadaire
  if(Math.sin(bgT*0.5)>0.3){
    var grad=ctx.createRadialGradient(cx,cy-s*10,0,cx,cy-s*10,s*7);

    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(cx,cy-s*10,s*7,0,Math.PI*2);ctx.fill();
  }
}

    var cycle=(t2*f.cs+f.ph)%(Math.PI*2);

    var p=cycle/Math.PI;

// 4) ÉTOILE FILANTE — zone nuit (1000-6000m), rare (~1/3 partie)
var shootingStar=null;
var shootingStarTimer=99999;
function resetShootingStar(){
  shootingStar=null;
  // 1 chance sur 3 d'avoir une étoile filante cette partie
  if(Math.random()<0.33){
    shootingStarTimer=400+Math.random()*1500;
  } else {
    shootingStarTimer=99999;
  }
}
function updateShootingStar(dist){
  if(dist<1000||dist>6000){
    if(shootingStar&&shootingStar.t>shootingStar.life)shootingStar=null;
    return;
  }
  if(shootingStar){
    shootingStar.t++;
    if(shootingStar.t>shootingStar.life){
      shootingStar=null;
      shootingStarTimer=99999; // une seule par partie
    }
  } else if(shootingStarTimer<99999){
    shootingStarTimer--;
    if(shootingStarTimer<=0){
      shootingStar={
        x:Math.random()*W*0.6,
        y:20+Math.random()*H*0.30,
        vx:4+Math.random()*2,
        vy:1.0+Math.random()*0.7,
        t:0,
        life:55
      };
    }
  }
}
function drawShootingStar(){
  if(!shootingStar)return;
  var s=shootingStar;
  var cx=s.x+s.vx*s.t,cy=s.y+s.vy*s.t;
  var fade=Math.max(0,1-s.t/s.life);
  // Traînée
  for(var i=0;i<14;i++){
    var tx=cx-s.vx*i,ty=cy-s.vy*i;
    var a=Math.max(0,1-i/14)*fade;
    ctx.fillStyle='rgba(255,255,255,'+a+')';
    var sz=i<3?2:1;
    ctx.fillRect(tx,ty,sz,sz);
  }
  // Tête lumineuse
  ctx.fillStyle='rgba(255,240,200,'+fade+')';
  ctx.fillRect(cx-1,cy-1,3,3);
  ctx.fillStyle='rgba(255,200,120,'+(fade*0.6)+')';
  ctx.fillRect(cx-2,cy,5,1);
  ctx.fillRect(cx,cy-2,1,5);
}

// 6) PROFONDEUR — couches de silhouettes lointaines en parallaxe
//    3 couches : montagnes lointaines (lent, hautes) → collines (médian) → avant-plan (rapide, bas)
function drawMountainLayer(camOff,amp,elev,color){
  // Polygone étendu jusqu'à y=H pour cacher soleil/lune qui descendent sous l'horizon.
  // La mer/plage (dessinées après) couvrent l'extension below SY, donc visuellement
  // on ne voit que la silhouette au-dessus de l'horizon — mais elle MASQUE le soleil.
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(-5,H);
  ctx.lineTo(-5,SY);
  for(var x=-5;x<=W+5;x+=4){
    var n=Math.sin((x+camOff)*0.0110)*0.45
         +Math.sin((x+camOff)*0.0270+1.3)*0.28
         +Math.sin((x+camOff)*0.0520)*0.15;
    n=Math.max(0,n+0.5);
    ctx.lineTo(x,SY-elev-n*amp);
  }
  ctx.lineTo(W+5,SY);
  ctx.lineTo(W+5,H);
  ctx.closePath();
  ctx.fill();
}
function drawMountains(dist){
  // Couleurs selon zone (sunset / nuit / astral)
  var c1,c2,c3;
  if(dist<1000){
    // Coucher de soleil : silhouettes violettes
    c1='rgba(50,12,90,0.42)';   // loin (plus pâle)
    c2='rgba(72,20,108,0.58)';
    c3='rgba(95,30,120,0.70)';  // proche (plus dense)
  } else if(dist<6000){
    // Nuit : silhouettes très sombres
    c1='rgba(14,8,30,0.55)';
    c2='rgba(26,14,46,0.72)';
    c3='rgba(42,22,60,0.80)';
  } else {
    // Astral : presque noires (renforce vide cosmique)
    c1='rgba(8,5,20,0.65)';
    c2='rgba(16,9,28,0.78)';
    c3='rgba(24,14,38,0.85)';
  }
  // Couche 1 : très lointaine, hautes montagnes, parallaxe lent
  drawMountainLayer(camX*0.09,        72, 18, c1);
  // Couche 2 : collines médianes
  drawMountainLayer(camX*0.20 + 437,  42, 8,  c2);
  // Couche 3 : avant-plan bas, parallaxe rapide
  drawMountainLayer(camX*0.38 + 813,  24, 0,  c3);
}

// 7) AURORE BORÉALE — zone astrale (6000m+). Boost si météo aurora_intense
function drawAurora(t2,astralP){
  if(astralP<=0)return;
  var boost=(weather==='aurora_intense')?1.8:1.0;
  var colors=[
    {c:'255,140,200',a:0.20*boost},  // rose vif (remplace le vert)
    {c:'120,200,255',a:0.16*boost},  // bleu lavande
    {c:'200,150,255',a:0.13*boost}   // violet
  ];
  // En mode intense, on ajoute une 4e bande rose saturée
  if(weather==='aurora_intense'){

  }
  ctx.globalAlpha=astralP;
  for(var band=0;band<colors.length;band++){
    var col=colors[band];
    var yBase=35+band*20;
    var grad=ctx.createLinearGradient(0,yBase-6,0,yBase+30);
    grad.addColorStop(0,'rgba('+col.c+',0)');
    grad.addColorStop(0.45,'rgba('+col.c+','+col.a+')');
    grad.addColorStop(1,'rgba('+col.c+',0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(0,yBase);
    for(var x=0;x<=W;x+=6){
      var wave=Math.sin((x*0.011)+t2*0.018+band*1.7)*14
              +Math.sin((x*0.026)+t2*0.011+band*0.7)*7;

      var wave2=Math.sin((x*0.011)+t2*0.018+band*1.7)*14
              +Math.sin((x*0.026)+t2*0.011+band*0.7)*7;
      ctx.lineTo(x,yBase+wave2+22+band*4);
    }
    ctx.closePath();ctx.fill();

}

// 10) VAGUES AVANT-PLAN — courbes lisses dorées (version d'origine)
// Config extraite pour que les vagues qui déferlent puissent réutiliser fgWaveY
var FG_WAVE_LAYERS=[
  {p:1.30, by:0, amp:6, fr:0.024, tspd:0.058, ph:0.0, BS:5},
  {p:1.50, by:0, amp:7, fr:0.030, tspd:0.045, ph:1.4, BS:5},
  {p:1.75, by:0, amp:9, fr:0.038, tspd:0.052, ph:2.5, BS:5}
];
function fgWaveY(L,x,off,t2){
  return L.by+Math.sin((x+off)*L.fr+t2*L.tspd+L.ph)*L.amp
             +Math.sin((x+off)*L.fr*2.3+t2*L.tspd*1.3)*L.amp*0.35;
}
function drawForegroundWaves(dist,t2){
  var seaStart=Math.max(0,toSX(SHORE));
  if(seaStart>=W)return;
  FG_WAVE_LAYERS[0].by=H-22;
  FG_WAVE_LAYERS[1].by=H-12;
  FG_WAVE_LAYERS[2].by=H-4;
  // Couleurs OR pour matcher l'affiche FDP
  var cols;
  if(dist<1000){
    cols=['rgba(255,200,100,0.45)','rgba(255,180,70,0.65)','rgba(255,201,60,0.86)'];
  } else if(dist<6000){
    cols=['rgba(255,200,90,0.48)','rgba(255,205,60,0.68)','rgba(255,220,80,0.90)'];
  } else {
    cols=['rgba(220,180,90,0.36)','rgba(240,200,90,0.55)','rgba(255,210,90,0.75)'];
  }
  FG_WAVE_LAYERS.forEach(function(L,idx){
    var off=camX*L.p;
    ctx.fillStyle=cols[idx];
    ctx.beginPath();
    ctx.moveTo(seaStart-5,H);
    ctx.lineTo(seaStart-5,L.by);
    for(var x=seaStart-5;x<=W+5;x+=4){
      var y=fgWaveY(L,x,off,t2);
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W+5,L.by);
    ctx.lineTo(W+5,H);
    ctx.closePath();ctx.fill();
  });
}

// 11) VAGUES QUI DÉFERLENT — pixel art chunky avec curl + spray
//     Cyclent par phases : formation (montée mousse) → break (curl max + projections) → dissipation
var WAVE_BREAKS=[];
(function initWaveBreaks(){
  // 7 spots de déferlement répartis sur la mer, chacun avec son cycle propre
  var spots=[3500, 9800, 17200, 26500, 36800, 48200, 60500];
  spots.forEach(function(wx,i){
    WAVE_BREAKS.push({
      wx:wx+Math.random()*1500,
      cs:0.012+Math.random()*0.010,   // vitesse du cycle (lente : ~5-9s par cycle)
      ph:Math.random()*Math.PI*2      // phase initiale décalée pour pas tous synchros
    });
  });
})();
function drawBreakingWaves(dist,t2){
  var seaStart=Math.max(0,toSX(SHORE));
  if(seaStart>=W)return;
  // Les déferlements sont sur la couche avant-plan (la plus proche du joueur)
  var L=FG_WAVE_LAYERS[2];
  var off=camX*L.p;
  WAVE_BREAKS.forEach(function(wb){
    var sx=wb.wx-camX*L.p;
    if(sx<-30||sx>W+30)return;
    if(sx<seaStart-10)return;
    // Cycle complet 0→2π, normalisé à [0,1]
    var cycle=((t2*wb.cs+wb.ph)%(Math.PI*2))/(Math.PI*2);
    // Y du déferlement = top de la vague à cette position
    var rawY=fgWaveY(L,sx,off,t2);
    var BS=L.BS;
    var wy=Math.floor(rawY/BS)*BS;
    drawBreakingPattern(sx,wy,cycle,BS);
  });
}
function drawBreakingPattern(cx,cy,p,BS){
  // Patterns pixel-art selon la phase du cycle
  if(p<0.25){
    // FORMATION — petite crête de mousse qui monte
    var a=p/0.25;
    ctx.fillStyle='rgba(255,255,255,'+a*0.85+')';
    ctx.fillRect(cx-BS,cy-BS,BS*2,BS);
    if(p>0.12){ctx.fillRect(cx-BS*0.5,cy-BS*2,BS,BS);}
  } else if(p<0.50){
    // BREAK — curl maximum + spray pixel-art
    var bp=(p-0.25)/0.25;
    ctx.fillStyle='#ffffff';
    // Curl principal (forme tube qui s'effondre)
    ctx.fillRect(cx-BS*2, cy-BS*2,    BS*4, BS);
    ctx.fillRect(cx-BS*2.5,cy-BS,     BS*5, BS);
    ctx.fillRect(cx-BS*3, cy,         BS*6, BS);
    ctx.fillRect(cx-BS*2, cy+BS,      BS*4, BS);
    // Spray (particules qui jaillissent)
    var spray='rgba(255,255,255,'+(1-bp*0.4)+')';
    ctx.fillStyle=spray;
    ctx.fillRect(cx-BS*4, cy-BS*3-bp*BS*2, BS, BS);
    ctx.fillRect(cx-BS*2, cy-BS*4-bp*BS*2, BS, BS);
    ctx.fillRect(cx+BS,   cy-BS*3-bp*BS*3, BS, BS);
    ctx.fillRect(cx+BS*3, cy-BS*2-bp*BS*2, BS, BS);
    ctx.fillRect(cx-BS*5, cy-BS-bp*BS,     1,  1);
    ctx.fillRect(cx+BS*4, cy-BS-bp*BS,     1,  1);
  } else if(p<0.78){
    // DISSIPATION — mousse qui s'étale et fade
    var a=1-(p-0.50)/0.28;
    ctx.fillStyle='rgba(255,255,255,'+a+')';
    ctx.fillRect(cx-BS*3, cy,    BS*6, BS);
    ctx.fillRect(cx-BS*2, cy-BS, BS*4, BS);
    // Traînées latérales
    ctx.fillStyle='rgba(255,255,255,'+a*0.6+')';
    ctx.fillRect(cx-BS*5, cy+BS, BS*2, 1);
    ctx.fillRect(cx+BS*3, cy+BS, BS*2, 1);
  }
  // p ∈ [0.78, 1.0] : rien, pause avant nouveau cycle
}

function drawSurfers(dist,t2){
  // Restreint à la zone mer (comme les vagues)
  var seaStart=Math.max(0,toSX(SHORE));
  if(seaStart>=W)return;
  // Surfeurs accrochés à la couche 1 des vagues avant-plan (parallaxe 1.30)
  var P=1.30, BY=H-22, AMP=6, FR=0.024, TSPD=0.058, PH=0.0;
  SURFERS.forEach(function(s){
    var parX=s.wx-camX*P;
    if(parX<-10||parX>W+10)return;
    if(parX<seaStart-5)return;
    // Y et inclinaison selon la vague en ce point
    var off=camX*P;
    var wy=BY+Math.sin((parX+off)*FR+t2*TSPD+PH)*AMP
              +Math.sin((parX+off)*FR*2.3+t2*TSPD*1.3)*AMP*0.35;
    // Tangente de la vague pour l'inclinaison
    var slope=Math.cos((parX+off)*FR+t2*TSPD+PH)*AMP*FR
             +Math.cos((parX+off)*FR*2.3+t2*TSPD*1.3)*AMP*0.35*FR*2.3;
    var ang=Math.atan(slope);
    ctx.save();
    ctx.translate(parX,wy-3); // légèrement plus haut au-dessus de la crête, plus visible
    ctx.rotate(ang);
    drawSurferSprite(s.pose,s.board,s.wetsuit);
    ctx.restore();
  });
}

function drawDecor(dist,t2){
  var pal=getSkyPalette(dist);

  sky.addColorStop(0,pal.top);sky.addColorStop(.55,pal.mid);sky.addColorStop(1,pal.bot);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // AURORE BORÉALE (derrière les étoiles/astres, uniquement zone astrale)
  drawAurora(t2,pal.astralP);

  drawCelestialPixel(dist,t2);

  // Étoiles
  if(pal.starA>0){
    STARS.forEach(function(s){
      ctx.fillStyle='rgba(240,171,252,'+pal.starA*(.35+.45*Math.sin(t2*.04+s.ph))+')';
      ctx.fillRect(s.x,s.y,s.sz,s.sz);
    });
  }

  // STARDUST (poussière d'étoiles dérivante, zone astrale uniquement)
  drawStardust(t2,pal.astralP);

  // ÉTOILE FILANTE (au-dessus des étoiles fixes, sous les nuages)
  drawShootingStar();

  // MONTAGNES LOINTAINES — 3 couches parallaxes pour donner profondeur
  drawMountains(dist);

  // Nuages — parallaxe lent (0.30) + boucle courte = arrière-plan qui défile doucement
  var CP=0.30;
  CLOUDS.forEach(function(cl){
    var rawSx=cl.x-camX*CP;
    var sx=((rawSx%CLOUD_LOOP)+CLOUD_LOOP)%CLOUD_LOOP;
    if(sx>W+100)sx-=CLOUD_LOOP;
    if(sx<-cl.w||sx>W+10){cl.x-=cl.spd;if(cl.x<0)cl.x+=CLOUD_LOOP;return;}
    var cc=dist<1000?'rgba(180,40,120,.4)':dist>3500?'rgba(160,80,120,.32)':'rgba(65,10,105,.44)';
    ctx.fillStyle=cc;ctx.fillRect(sx,cl.y,cl.w,cl.h);ctx.fillRect(sx+cl.w*.2,cl.y-cl.h*.38,cl.w*.6,cl.h*.48);
    cl.x-=cl.spd;if(cl.x<0)cl.x+=CLOUD_LOOP;
  });

  // Mer
  var seaG=ctx.createLinearGradient(0,SY,0,H);seaG.addColorStop(0,pal.sea);seaG.addColorStop(1,'rgba(5,0,15,1)');
  ctx.fillStyle=seaG;ctx.fillRect(toSX(SHORE),SY,W+200,H-SY);
  for(var l=0;l<3;l++){
    var wc=dist<1000?'rgba(255,80,160,'+(.08+l*.05)+')':dist>3500?'rgba(200,80,100,'+(.06+l*.05)+')':'rgba(107,33,168,'+(.08+l*.07)+')';
    ctx.fillStyle=wc;
    ctx.beginPath();ctx.moveTo(toSX(SHORE),SY+l*7);
    for(var x=toSX(SHORE);x<=W+8;x+=5)ctx.lineTo(x,SY+l*7+Math.sin((x+camX)*.014+t2*.035+l*1.4)*4);
    ctx.lineTo(W,H);ctx.lineTo(toSX(SHORE),H);ctx.closePath();ctx.fill();
  }

  // VOILIERS (sur l'horizon, derrière bouées) + POISSONS SAUTEURS
  drawSailboats(dist,t2);
  drawJumpingFish(t2);

  // Bouées
  BUOYS.forEach(function(b){
    var sx=toSX(b.x);if(sx<-15||sx>W+15)return;
    var by=SY+Math.sin(t2*.05+b.ph)*4-9;
    ctx.strokeStyle='#4a1070';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx,SY);ctx.lineTo(sx,by+14);ctx.stroke();
    ctx.fillStyle='#7b1aa8';ctx.fillRect(sx-5,by,10,13);
    ctx.fillStyle='#f0abfc';ctx.fillRect(sx-4,by+2,8,3);ctx.fillRect(sx-4,by+7,8,3);
    if(Math.floor(t2*.12)%2===0){ctx.fillStyle='#fff';ctx.fillRect(sx-2,by-4,4,4);}
  });

  // Plage
  var beachCol=dist<1000?'rgba(58,15,70,1)':dist>3500?'rgba(55,25,55,.95)':'rgba(32,16,64,1)';
  var bG=ctx.createLinearGradient(0,GY,0,H);bG.addColorStop(0,beachCol);bG.addColorStop(1,'rgba(8,4,18,1)');
  ctx.fillStyle=bG;ctx.fillRect(0,GY,toSX(SHORE)+4,H-GY);
  ctx.fillStyle=dist<1000?'#5a1a4a':'#360e5a';ctx.fillRect(toSX(SHORE)-5,GY,10,H-GY);

  // OYATS — touffes d'herbe de dune sur la plage du début
  drawOyats(dist,t2);

  // PHARE de Pors-Poulhan (sur la falaise, après que plage soit dessinée)
  drawLighthouse();

  // VAGUES AVANT-PLAN + DÉFERLEMENTS + SURFEURS — les éléments les plus proches du joueur
  drawForegroundWaves(dist,t2);
  drawBreakingWaves(dist,t2);
  drawSurfers(dist,t2);

  // MÉTÉO ALÉATOIRE — overlay environnemental (orage / brouillard)
  drawWeatherEffects(dist);
}

// ══════ PETIT CRABE (remplace drawFDPLogo + drawFDPExplosion) ══════
// HITBOX 50×38 INCHANGÉE — uniquement le visuel change.
// prox: 0 = moule loin (statique), 1 = moule juste à côté (pinces ouvertes + tremblement)
// lookX, lookY (en coord écran) : position de la moule, les yeux la suivent
function drawSmallCrab(cx,cy,s,prox,lookX,lookY){
  s=s||5;
  prox=prox||0;
  // Tremblement + ouverture des pinces (s'accélère à l'approche)
  var freq=0.8+prox*5;
  var twitch=Math.sin(bgT*freq*8)*(0.3+prox*1.4);
  var open=prox*s*0.7;
  // Frémissement des pattes — visible surtout à courte distance
  var legJ=Math.sin(bgT*18+cx*0.3)*prox*1.1;
  // Direction du regard (pupilles suivent la moule si fournie)
  var lookDx=0, lookDy=0;
  if(lookX!==undefined){
    var ddx=lookX-cx, ddy=lookY-cy;
    var dd=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dd>1){
      var mag=0.7+prox*0.5; // les pupilles bougent plus à l'approche
      lookDx=(ddx/dd)*mag;
      lookDy=(ddy/dd)*mag;
    }
  }
  // PATTES — bougent en opposition gauche/droite quand prox élevé (effet course en place)
  // Gauche
  px(cx,cy,-s*4.5,-s*1+legJ*0.6,s,s*1.5,'#902010');
  px(cx,cy,-s*4,s*0.3+legJ,s,s*1.5,'#902010');
  px(cx,cy,-s*4.5,s*1.5-legJ*0.4,s,s*1.2,'#902010');
  // Droite (opposition)
  px(cx,cy,s*3.5,-s*1-legJ*0.6,s,s*1.5,'#902010');
  px(cx,cy,s*3,s*0.3-legJ,s,s*1.5,'#902010');
  px(cx,cy,s*3.5,s*1.5+legJ*0.4,s,s*1.2,'#902010');
  // PINCES — bras stables, mandibules ANIMÉES
  // Gauche
  px(cx,cy,-s*3.5,-s*2.5,s*0.8,s,'#a02808');
  px(cx,cy,-s*4,-s*3.5,s*1.5,s,'#a02808');
  px(cx,cy,-s*4.2,-s*4.3-open+twitch,s*1.8,s*0.8,'#c82810');
  px(cx,cy,-s*4.2,-s*3+open*0.4-twitch,s*1.8,s*0.4,'#c82810');
  // Droite (phase opposée)
  px(cx,cy,s*2.7,-s*2.5,s*0.8,s,'#a02808');
  px(cx,cy,s*2.5,-s*3.5,s*1.5,s,'#a02808');
  px(cx,cy,s*2.4,-s*4.3-open-twitch,s*1.8,s*0.8,'#c82810');
  px(cx,cy,s*2.4,-s*3+open*0.4+twitch,s*1.8,s*0.4,'#c82810');
  // CORPS (carapace bombée avec gradient de teintes)
  px(cx,cy,-s*2.5,s*1,s*5,s,'#902010');
  px(cx,cy,-s*3,-s*0.5,s*6,s*1.7,'#b02010');
  px(cx,cy,-s*2.5,-s*1.5,s*5,s*1.2,'#c82010');
  px(cx,cy,-s*2,-s*2,s*4,s*0.7,'#e03020');
  px(cx,cy,-s,-s*2,s*2,s*0.5,'#ff5530');
  // YEUX — tiges (statiques)
  px(cx,cy,-s*1.3,-s*2.8,s*0.5,s*0.8,'#902010');
  px(cx,cy,s*0.8,-s*2.8,s*0.5,s*0.8,'#902010');
  // CLIGNEMENT — uniquement quand prox > 0.4, accélère avec prox (panique)
  var eyesClosed=false;
  if(prox>0.4){
    var blinkRate=3+prox*6; // 3-9 Hz selon stress
    var blinkPhase=(bgT*blinkRate+cx*0.01)%1;
    eyesClosed=blinkPhase<0.16; // yeux fermés pendant 16% du cycle
  }
  if(eyesClosed){
    // Yeux fermés : 2 fentes horizontales (style "><")
    px(cx,cy,-s*1.6,-s*3.15,s,s*0.3,'#0a0a0a');
    px(cx,cy,s*0.6,-s*3.15,s,s*0.3,'#0a0a0a');
  } else {
    // Yeux ouverts : globes noirs + pupilles qui suivent la moule
    px(cx,cy,-s*1.6,-s*3.5,s,s,'#0a0a0a');
    px(cx,cy,s*0.6,-s*3.5,s,s,'#0a0a0a');
    px(cx+lookDx,cy+lookDy,-s*1.4,-s*3.3,s*0.4,s*0.4,'#fff');
    px(cx+lookDx,cy+lookDy,s*0.8,-s*3.3,s*0.4,s*0.4,'#fff');
  }
}

function drawCrabHit(cx,cy,ep){
  var prog=Math.min(ep/1.4,1);
  // Particules rouges/oranges/blanches qui giclent (palette crabe)
  [{r:prog*70,cols:['#ff5530','#c82010','#fff','#ffd700'],n:14,sz:(1-prog)*12+1},
   {r:prog*44,cols:['#ff8c00','#e03020','#fff'],n:9,sz:(1-prog)*8+1},
   {r:prog*22,cols:['#fff','#ffd700'],n:6,sz:(1-prog)*5+1}
  ].forEach(function(rg){if(rg.sz<.5)return;for(var i=0;i<rg.n;i++){var a=i/rg.n*Math.PI*2+ep*.4;ctx.fillStyle=rg.cols[i%rg.cols.length];ctx.fillRect(cx+Math.cos(a)*rg.r-rg.sz/2,cy+Math.sin(a)*rg.r-rg.sz/2,rg.sz,rg.sz);}});
  // Texte d'impact (combo)
  if(prog<.65){ctx.font='8px "Press Start 2P"';ctx.fillStyle='rgba(255,80,40,'+(.65-prog)*2+')';ctx.textAlign='center';ctx.fillText('CRAC !',cx,cy-prog*42);ctx.textAlign='left';}
}

function drawFDPs(){
  fdps.forEach(function(m){
    var sx=toSX(m.wx);if(sx<-50||sx>W+50)return;
    var fy=getFdpY(m); // CENTRE HITBOX — inchangé
    // Décalage visuel : crabe 6 px plus bas pour que les pattes (s=6) touchent le sol/la mer
    var visualY=fy+6;
    if(m.ep>0){drawCrabHit(sx,visualY,m.ep);if(m.ep<1.6)m.ep+=.048;return;}
    if(m.hit)return;
    // Proximité (basée sur fy = centre hitbox)
    var prox=0, lookX, lookY;
    if(gState==='play'&&phase==='flying'){
      var dx=M.wx-m.wx, dy=M.wy-fy;
      var d=Math.sqrt(dx*dx+dy*dy);
      prox=Math.max(0,1-d/220);
      prox=prox*prox;
      // Position écran de la moule pour le regard des crabes
      lookX=M.wx-camX;
      lookY=M.wy;
    }
    drawSmallCrab(sx,visualY,6,prox,lookX,lookY);
  });
}

var GULL_WXS=[800,2000,4000,7000,11000,16000,22000,30000,40000,52000,60000,64000];
var gulls=[];
function resetGulls(){
  gulls=GULL_WXS.map(function(x,i){
    return{wx:x+Math.random()*300-150,y:50+Math.random()*140,
      spd:(i%2===0?1:-1)*(1+Math.random()*1.5),
      hit:false,fallVx:0,fallVy:0,fallAng:0,fallSpin:0,
      plumes:[],stars:[],cryT:0,wingT:0};
  });
}

function drawGull(g){
  var sx=toSX(g.wx);if(sx<-80||sx>W+80)return;
  var s=5;
  g.wingT+=0.12;
  var wing=Math.sin(g.wingT)*s*2;

  if(g.hit){
    // Mouette en vrille — tourne et tombe
    g.fallVy+=0.35;
    g.wx+=g.fallVx;
    g.y+=g.fallVy;
    g.fallAng+=g.fallSpin;
    g.cryT++;

    // Plumes
    g.plumes.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.ang+=p.spin;p.life-=0.02;
    });
    g.plumes=g.plumes.filter(function(p){return p.life>0;});

    // Étoiles
    g.stars.forEach(function(s2){s2.x+=s2.vx;s2.y+=s2.vy;s2.life-=0.05;});
    g.stars=g.stars.filter(function(s2){return s2.life>0;});

    // Dessiner plumes
    g.plumes.forEach(function(p){
      ctx.save();ctx.translate(p.x-camX,p.y);ctx.rotate(p.ang);
      ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
      ctx.fillRect(-7,-2,14,3);ctx.fillRect(-2,-5,4,10);
      ctx.globalAlpha=1;ctx.restore();
    });

    // Dessiner étoiles impact
    g.stars.forEach(function(s2){
      ctx.globalAlpha=s2.life;ctx.fillStyle='#ffd700';
      ctx.fillRect(s2.x-camX-3,s2.y-3,6,6);
      ctx.fillRect(s2.x-camX-1,s2.y-6,2,12);
      ctx.fillRect(s2.x-camX-6,s2.y-1,12,2);
      ctx.globalAlpha=1;
    });

    // Mouette qui tourne
    var gsx=toSX(g.wx),gsy=g.y;
    if(gsy<H+40){
      ctx.save();ctx.translate(gsx,gsy);ctx.rotate(g.fallAng);
      // Corps
      px(0,0,-s*3,-s,s*6,s*2,'#e8e8f0');
      px(0,0,s*2,-s*2,s*3,s*2,'#f4f0fc');
      // Bec
      px(0,0,s*4,-s,s*3,s,'#e8a020');
      // Ailes déployées (sonnée)
      px(0,0,-s*8,-s,s*6,s,'#d0c8e4');
      px(0,0,s*3,-s,s*6,s,'#d0c8e4');
      // Étoiles autour tête
      if(Math.floor(bgT*4)%2===0){
        ctx.fillStyle='#ffd700';ctx.font='9px monospace';ctx.textAlign='center';
        ctx.fillText('*',s*5,-s*3);ctx.fillText('*',s*3,-s*4);
        ctx.textAlign='left';
      }
      ctx.restore();
    }

    // Cri "AAARK!!"
    if(g.cryT<30){
      ctx.globalAlpha=Math.max(0,1-g.cryT/25);
      ctx.font='bold 9px "Press Start 2P"';ctx.fillStyle='#fff';ctx.textAlign='center';
      ctx.shadowColor='#000';ctx.shadowBlur=4;
      ctx.fillText('AAARK!!',toSX(g.wx),g.y-25-g.cryT*.5);
      ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.textAlign='left';
    }

    // Reset quand hors écran
    if(g.y>H+60||toSX(g.wx)<-200){
      g.hit=false;g.y=50+Math.random()*140;
      g.wx=camX+W+100+Math.random()*200;
      g.fallVx=0;g.fallVy=0;g.fallAng=0;g.plumes=[];g.stars=[];g.cryT=0;
    }
    return;
  }

  // Mouette normale
  var sx2=toSX(g.wx);
  ctx.save();ctx.translate(sx2,g.y);if(g.spd<0)ctx.scale(-1,1);
  px(0,0,-s*5,-s*2-wing,s*2,s,'#d0c8e4');
  px(0,0,-s*3,-s-wing,s,s,'#e0d8f0');
  px(0,0,-s*2,-s,s*4,s,'#eee8fc');
  px(0,0,s*2,-s-wing,s,s,'#e0d8f0');
  px(0,0,s*3,-s*2-wing,s*2,s,'#d0c8e4');
  px(0,0,-s,-s*2,s*2,s,'#f4f0fc');
  px(0,0,s,-s*2,s*2,Math.max(1,s*.6|0),'#f0a010');
  px(0,0,s*.3|0,-s*2,Math.max(1,s*.6|0),Math.max(1,s*.6|0),'#111');
  px(0,0,-s*2,0,s,Math.max(1,s*.5|0),'#c8c0e0');
  ctx.restore();
  g.wx+=g.spd;
  if(g.wx<camX-200)g.spd=Math.abs(g.spd);
  if(g.wx>camX+W+200)g.spd=-Math.abs(g.spd);
}

function updateGulls(){
  gulls.forEach(function(g){
    if(g.hit)return;
    var dx=M.wx-g.wx, dy=M.wy-g.y;
    if(Math.sqrt(dx*dx+dy*dy)<35){
      g.hit=true;
      g.fallVx=(M.vx*.3+(Math.random()-.5)*3);
      g.fallVy=-7-Math.random()*4;
      g.fallSpin=(Math.random()-.5)*0.25+0.15;
      // Plumes
      for(var i=0;i<16;i++){
        g.plumes.push({
          x:g.wx,y:g.y,
          vx:(Math.random()-.5)*7,vy:-Math.random()*5-1,
          ang:Math.random()*Math.PI*2,spin:(Math.random()-.5)*0.2,
          life:1,col:Math.random()<.7?'#eef0f0':'#d0c8e4'
        });
      }
      // Étoiles
      for(var i=0;i<8;i++){
        var a=i/8*Math.PI*2;
        g.stars.push({x:g.wx,y:g.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:1});
      }
      // BOOST moule au lieu de freiner !
      sfxGull();
      gullBoostT=25;
      M.vy=Math.min(M.vy,-7)-Math.random()*2;
      M.vx=Math.max(M.vx*1.15,12)+Math.random()*3;
      if(M.vx>VX_CAP)M.vx=VX_CAP; // cap vitesse aussi sur boost mouette
      M.spin-=0.15;
      shakeStr=4;shakeT=10;
    }
  });
}

function drawDanceCrab(cx,cy,t2){
  var s=4;

  var lr=Math.floor(t2*4)%2===0?s*3:s*4;
  px(cx,cy,-s*7,s*3+bob,s,ll,'#b02808');px(cx,cy,-s*6,s*3+bob,s,lr,'#b02808');
  px(cx,cy,s*4,s*3+bob,s,lr,'#b02808');px(cx,cy,s*5,s*3+bob,s,ll,'#b02808');
  // Corps en V
  px(cx,cy,-s*2,s*2+bob,s*4,s*2,'#901808');
  px(cx,cy,-s*3,bob,s*6,s*3,'#b02010');
  px(cx,cy,-s*5,-s*2+bob,s*10,s*3,'#c82808');
  px(cx,cy,-s*6,-s*3+bob,s*3,s*2,'#c02808');
  px(cx,cy,s*3,-s*3+bob,s*3,s*2,'#c02808');
  px(cx,cy,-s*3,-s*3+bob,s*6,s*2,'#e03010');
  px(cx,cy,-s*2,-s*4+bob,s*4,s,'#f04020');
  // Yeux
  px(cx,cy,-s*2,-s*7+bob,s,s*3,'#c02808');px(cx,cy,s,-s*7+bob,s,s*3,'#c02808');
  px(cx,cy,-s*3,-s*9+bob,s*3,s*3,'#0a0a0a');px(cx,cy,s,-s*9+bob,s*3,s*3,'#0a0a0a');
  px(cx,cy,-s*3,-s*9+bob,s,s,'#fff');px(cx,cy,s,-s*9+bob,s,s,'#fff');
  // Pinces levées
  ctx.save();ctx.translate(cx+s*6,cy-s*2+bob);ctx.rotate(-0.5+pa);
  px(0,0,0,-s,s*5,s*2,'#c82e08');
  px(0,0,s*5,-s*2,s*2,s*4,'#d03010');px(0,0,s*6,-s*3,s*3,s,'#e04010');px(0,0,s*6,s,s*3,s,'#e04010');
  ctx.restore();
  ctx.save();ctx.translate(cx-s*6,cy-s*2+bob);ctx.rotate(Math.PI+0.5-pa);
  px(0,0,0,-s,s*5,s*2,'#c82e08');
  px(0,0,s*5,-s*2,s*2,s*4,'#d03010');px(0,0,s*6,-s*3,s*3,s,'#e04010');px(0,0,s*6,s,s*3,s,'#e04010');
  ctx.restore();
  // Note de musique
  if(Math.floor(t2*1.5+cx*.01)%3===0){
    ctx.fillStyle='#ffd700';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText('♪',cx+(Math.floor(t2*2)%2===0?-8:8),cy-s*12+bob);ctx.textAlign='left';
  }
}

// Positions des crabes célébration
var DANCE_CRABS=[
  {ox:80,phase:0},{ox:220,phase:1.2},{ox:380,phase:0.5},{ox:550,phase:1.8},
  {ox:700,phase:0.3},{ox:900,phase:1.5},{ox:1100,phase:0.8},{ox:1300,phase:2.1},

function drawFinish(){
  var sx=toSX(FINISH_WX);

  // ══ SQUELETTES DES CHAMPIONS (à 6010m) ══
  drawSquelettesHommage();

  // ══ ZONE CÉLÉBRATION (entre FINISH et CELEBRATE_END_WX, pas REAL_END) ══
  var celSX=toSX(CELEBRATE_WX);
  var endSX=toSX(CELEBRATE_END_WX);
  if(endSX>0&&celSX<W){
    // Fond spécial — dégradé festif
    var grad=ctx.createLinearGradient(Math.max(0,celSX),0,Math.min(W,endSX),0);
    grad.addColorStop(0,'rgba(107,33,168,0)');
    grad.addColorStop(0.05,'rgba(107,33,168,.15)');
    grad.addColorStop(1,'rgba(192,38,211,.25)');
    ctx.fillStyle=grad;ctx.fillRect(Math.max(0,celSX),0,Math.min(W,endSX)-Math.max(0,celSX),H);

    // Banderoles au sol (dans la zone célébration uniquement, ~5010m à 6020m)
    for(var b=0;b<20;b++){
      var bwx=CELEBRATE_WX+b*700;
      if(bwx>CELEBRATE_END_WX)break;
      var bx=toSX(bwx);
      if(bx<-10||bx>W+10)continue;
      ctx.fillStyle=b%2===0?'rgba(255,215,0,.3)':'rgba(192,38,211,.3)';
      ctx.fillRect(bx,GY,8,H-GY);
    }

    // Confettis
    CONFETTI.forEach(function(c){
      var cx2=toSX(c.x);if(cx2<-10||cx2>W+10)return;
      c.y+=c.vy;if(c.y>H+8)c.y=-8;
      ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(bgT*2+c.ph));
      ctx.fillStyle=c.col;
      ctx.fillRect(cx2,c.y,c.sz,Math.max(1,c.sz*Math.abs(Math.sin(bgT*1.5+c.ph))));
      ctx.globalAlpha=1;
    });

    // Crabes dansants déplacés après 6000m (au-delà des squelettes top 3)
    DANCE_CRABS.forEach(function(dc){
      var dwx=CRABS_DANCE_WX+dc.ox;
      var cx2=toSX(dwx);
      if(cx2<-40||cx2>W+40)return;
      drawDanceCrab(cx2,GY,bgT+dc.phase);
    });

    // Panneau "RECORD 2026" à la fin de la zone célébration
    var esx=toSX(CELEBRATE_END_WX);
    if(esx>-80&&esx<W+20){
      ctx.fillStyle='#5a3a10';ctx.fillRect(esx-3,GY-60,6,60);
      ctx.fillStyle='#1e0038';ctx.fillRect(esx-40,GY-98,80,38);
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.strokeRect(esx-40,GY-98,80,38);
      for(var i=0;i<8;i++){ctx.fillStyle=i%2===0?'#ffd700':'#c026d3';ctx.fillRect(esx-40+i*10,GY-98,10,4);}
      ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillStyle='#ffd700';ctx.shadowColor='#c026d3';ctx.shadowBlur=8;
      ctx.fillText('RECORD 2026',esx,GY-74);ctx.shadowBlur=0;ctx.textAlign='left';
    }
  }

  // (panneau FIN retiré pour simplifier la zone)
}

// ══════ GAME STATE ══════
var gState='menu',playerName='MOULE';
var phase='ready',armT=0,snapT=0,isDown=false;
var M={wx:0,wy:0,vx:0,vy:0,ang:0,spin:0,dist:0};
var combo=0,shakeT=0,shakeStr=0,sessionRecord=0,gullBoostT=0;

function resetAll(){
  phase='ready';armAngle=ARM_LO;armT=0;snapT=0;isDown=false;camX=0;gameT=0;
  M={wx:0,wy:0,vx:0,vy:0,ang:0,spin:0,dist:0};
  combo=0;shakeT=0;shakeStr=0;gullBoostT=0;
  fireParticles=[];
  fireworks=[];
  topBeaten=false;
  flightStartT=0;
  setSlowMo(false);
  resetFDPs();resetGulls();
  resetShootingStar();
  pickWeather();
  comboFlash=0;comboFlashPeak=0;stormFlashT=0;
}

function updatePhysics(){
  // timeScale = 1 normal, 0.5 en slow mo (combo x5+)
  M.vy+=GRAVITY*timeScale;
  M.wx+=M.vx*timeScale;
  M.wy+=M.vy*timeScale;
  M.ang+=M.spin*timeScale;
  M.spin*=Math.pow(.976,timeScale);
  M.vx*=Math.pow(.9993,timeScale);
  // Active/désactive le slow mo selon le combo
  if(combo>=5&&!slowMoActive)setSlowMo(true);
  else if(combo<5&&slowMoActive)setSlowMo(false);
  // Spawn flammes en slow mo
  if(slowMoActive)spawnFire();
  updateFireParticles();
  var inSea=M.wx>=SHORE,gy=inSea?SY:GY;
  if(M.wy>=gy-8){
    M.wy=gy-8;var spd=Math.sqrt(M.vx*M.vx+M.vy*M.vy);
    if(spd<1.0){phase='done';return;}
    // Auto-explode si la moule rate son lancé (< 14m) — mais on laisse 0.8s pour échapper la zone de lancement
    if(Date.now()-flightStartT>800){
      var distNow=Math.max(0,Math.round((M.wx-CRAB_WX)/METERS));
      if(distNow<14){phase='done';return;}
    }
    combo=0; // reset combo au sol
    if(inSea){sfxSplash();M.vy*=-0.3;M.vx*=0.65;M.spin*=.5;}
    else{sfxBounce();M.vy*=-0.46;M.vx*=0.76;M.spin*=.55;}
  }
  fdps.forEach(function(m){
    if(m.hit)return;var fy=getFdpY(m);
    // Hitbox élargie en X (50) et Y (38) — plus de panache, moins de frustration
    if(Math.abs(M.wx-m.wx)<50&&Math.abs(M.wy-fy)<38){
      m.hit=true;m.ep=0.01;sfxFDP();
      combo++;
      // Flashes & sons spéciaux aux paliers x6 / x7 / x8+
      if(combo===6){
        triggerComboFlash(0.55);
        sfxExplosion();
      } else if(combo===7){
        triggerComboFlash(0.85);
        sfxExplosion();
        sfxMeteor();
      } else if(combo>=8){
        triggerComboFlash(1.0);
        sfxExplosion();
        sfxMeteor();
      }
      var mult=combo>=6?1.5:combo===5?1.4:combo===4?1.3:combo===3?1.2:combo===2?1.1:1.0;
      M.vy=Math.min(M.vy,-9*mult)-Math.random()*3;
      M.vx=Math.max(M.vx*1.1,10)*mult+Math.random()*4;
      // Cap vitesse horizontale — empêche le décollage absurde
      if(M.vx>VX_CAP)M.vx=VX_CAP;
      M.spin=-(0.1+Math.random()*.12);
      shakeStr=Math.min(combo,6)*2;shakeT=12;
    }
  });
  updateGulls();
  // CAMERA — smoothing adaptatif à la vitesse + clamp dur pour empêcher la moule de sortir à droite
  // Quand la moule va vite (combo x5+ ou boost mouette), la caméra doit la suivre plus agressivement
  var spd=Math.abs(M.vx);
  // Target X : on regarde plus loin devant quand on va vite (anticipation)
  var anchor=spd>40?0.40:spd>25?0.34:0.28;
  var tc=M.wx-W*anchor;
  // Lerp factor : plus rapide à la suivre quand la vitesse monte
  var lerp=spd>40?0.22:spd>25?0.16:0.10;
  if(tc>camX)camX+=(tc-camX)*lerp;
  // Clamp dur : la moule ne doit jamais dépasser 78% de l'écran à droite
  var mScreenX=M.wx-camX;
  if(mScreenX>W*0.78)camX=M.wx-W*0.78;
  if(camX<0)camX=0;
  if(M.wx>=REAL_END_WX||M.wy>H+80){if(M.wx>REAL_END_WX)M.wx=REAL_END_WX;phase='done';}
  M.dist=Math.max(0,Math.round((M.wx-CRAB_WX)/METERS));
}

// ══════ LOOP ══════
function loop(ts){
  requestAnimationFrame(loop);
  bgT=ts*.001;
  if(gState==='play')gameT++;
  var dist=Math.max(0,Math.round((M.wx-CRAB_WX)/METERS));

  // Update étoile filante (zone nuit uniquement, ne dépend pas de la physique)
  if(gState==='play')updateShootingStar(dist);

  // Shake
  var sx=0,sy=0;
  if(shakeT>0){shakeT--;sx=(Math.random()-.5)*shakeStr;sy=(Math.random()-.5)*shakeStr;}
  // Shake continu en mode météor (subtil)
  if(slowMoActive&&phase==='flying'){
    sx+=(Math.random()-.5)*1.5;
    sy+=(Math.random()-.5)*1.5;
  }

  ctx.save();
  if(sx||sy)ctx.translate(sx,sy);
  drawDecor(dist,bgT);
  drawFDPs();
  drawFinish();
  if(gState==='play')gulls.forEach(drawGull);
  if(gState!=='play'){ctx.restore();return;}

  if(phase==='ready'){drawCrab(true);drawInstruction('APPUIE ET MAINTIENS POUR LEVER LA PINCE');}
  if(phase==='charging'){
    armT+=0.018;
    // Monte linéairement de ARM_LO vers ARM_HI puis reste bloqué
    var chargeP=Math.min(armT,1);
    armAngle=ARM_LO+(ARM_HI-ARM_LO)*chargeP;
    if(Math.floor(armT*8)%4===0)sfxCharge();
    drawCrab(true);drawInstruction('RELACHE POUR LANCER !','#ffd700');
  }
  if(phase==='snap'){snapT++;armAngle+=(ARM_HI-0.3-armAngle)*0.4;drawCrab(false);drawMusselFlying(M.wx,M.wy,M.ang);if(snapT>6)phase='flying';}
  if(phase==='flying'){
    updatePhysics();
    checkBeatTop();
    updateFireworks();
    if(toSX(CRAB_WX)>-100)drawCrab(false);
    drawFireParticles();
    drawFireworks();
    drawMusselFlying(M.wx,M.wy,M.ang);
    drawHUD(M.dist);
  }
  if(phase==='done'){
    if(toSX(CRAB_WX)>-100)drawCrab(false);
    drawMusselFlying(M.wx,M.wy,M.ang);
    drawHUD(M.dist);
    // Instruction clignotante
    if(Math.floor(bgT*2)%2===0)drawInstruction('TAPE POUR VOIR TON SCORE','#ffd700');
  }
  // Embrasement atmosphérique au combo 6+ (la moule met le ciel en feu)
  if(combo>=6&&phase==='flying'){
    var intensity=Math.min((combo-5)*0.08,0.3);
    var pulse=intensity+Math.sin(bgT*15)*0.04;
    ctx.fillStyle='rgba(255,180,80,'+pulse+')';
    ctx.fillRect(0,0,W,H);
    if(combo>=8){
      ctx.fillStyle='rgba(255,255,200,'+(pulse*0.4)+')';
      ctx.fillRect(0,0,W,H);
    }
  }
  // DISTORTION + COLOR SHIFT — actifs à partir de combo x7 (entrée météore)
  if(combo>=7&&phase==='flying'){
    var dInt=Math.min((combo-6)*0.5,1.0); // 0.5 à x7, 1.0 à x8+
    // Chromatic aberration : couches cyan/magenta offset (RGB split)
    var ofx=2+Math.sin(bgT*30)*1.2;
    ctx.fillStyle='rgba(80,180,255,'+(dInt*0.11)+')';
    ctx.fillRect(-ofx,0,W,H);
    ctx.fillStyle='rgba(255,80,200,'+(dInt*0.11)+')';
    ctx.fillRect(ofx,0,W,H);
    // Color shift global : voile violet saturé
    ctx.fillStyle='rgba(180,80,220,'+(dInt*0.09)+')';
    ctx.fillRect(0,0,W,H);
    // Scanlines CRT (effet écran tube qui pète)
    ctx.fillStyle='rgba(0,0,0,'+(dInt*0.16)+')';
    for(var sl=0;sl<H;sl+=4){
      ctx.fillRect(0,sl,W,1);
    }
  }
  // FLASH COMBO (x6/x7/x8) — au-dessus de tout, décroît en ~17 frames
  if(comboFlash>0){
    ctx.fillStyle='rgba(255,255,255,'+(comboFlash*comboFlashPeak)+')';
    ctx.fillRect(0,0,W,H);
    comboFlash-=0.06;
    if(comboFlash<0)comboFlash=0;
  }
  // Texture grain (effet papier/CRT) — toujours appliquée
  drawGrain();
  // Flash d'entrée mode météor (overlay full-screen) — au-dessus du grain
  if(slowMoEntryFlash>0){
    slowMoEntryFlash--;
    var a=slowMoEntryFlash/18;
    ctx.fillStyle='rgba(255,180,80,'+(a*0.6)+')';
    ctx.fillRect(0,0,W,H);
    if(slowMoEntryFlash>10){
      ctx.fillStyle='rgba(255,255,200,'+(a*0.3)+')';
      ctx.fillRect(0,0,W,H);
    }
  }
  ctx.restore();
}

function drawInstruction(txt,col){ctx.font='6px "Press Start 2P"';ctx.fillStyle=col||'rgba(240,171,252,.8)';ctx.textAlign='center';ctx.fillText(txt,W/2,H-12);ctx.textAlign='left';}
function drawHUD(d){
  // Distance
  ctx.font='11px "Press Start 2P"';ctx.fillStyle='#ffd700';ctx.textAlign='center';
  ctx.fillText(d+' m',W/2,24);
  // Record session
  if(sessionRecord>0){
    ctx.font='6px "Press Start 2P"';ctx.fillStyle='rgba(240,171,252,.7)';
    ctx.fillText('RECORD: '+sessionRecord+'m',W/2,38);
  }
  // Combo
  if(combo>=2){
    var cc=combo>=6?'#ff4040':combo>=4?'#ff8000':'#ffd700';
    ctx.font='8px "Press Start 2P"';ctx.fillStyle=cc;
    ctx.fillText('COMBO x'+combo+'!',W/2,H-24);
  }
  // Boost mouette
  if(gullBoostT>0){
    gullBoostT--;
    var a=Math.min(1,gullBoostT/10)*Math.max(0,(gullBoostT)/25);
    ctx.globalAlpha=a;
    ctx.font='8px "Press Start 2P"';ctx.fillStyle='#fff';
    ctx.shadowColor='#4488ff';ctx.shadowBlur=8;
    ctx.fillText('🐦 AAARK!!',W/2,H-42);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    // Flash bleu clair
    if(gullBoostT>18){
      ctx.fillStyle='rgba(180,220,255,'+(gullBoostT-18)/7*.15+')';
      ctx.fillRect(0,0,W,H);
    }
  }
  ctx.textAlign='left';
}

// ══════ INPUT ══════
function onDown(){
  if(gState!=='play')return;
  getAC();
  trackAction();
  if(phase==='done'){showResult();return;}
  if(phase==='ready'||phase==='charging'){if(phase==='ready')armT=0;phase='charging';isDown=true;}
}
function onUp(){if(!isDown||gState!=='play')return;isDown=false;trackAction();if(phase==='charging'){var tip=getTipWorld(),lv=getLaunchVec();M.wx=tip.wx;M.wy=tip.wy;M.vx=lv.vx;M.vy=lv.vy;M.ang=0;M.spin=-0.08;M.dist=0;sfxLaunch();snapT=0;phase='snap';flightStartT=Date.now();}}
canvas.addEventListener('touchstart',function(e){e.preventDefault();onDown();},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();onUp();},{passive:false});
canvas.addEventListener('mousedown',function(e){e.preventDefault();onDown();});
canvas.addEventListener('mouseup',function(e){e.preventDefault();onUp();});
document.addEventListener('keydown',function(e){if(e.key===' '&&!e.repeat){e.preventDefault();onDown();}});
document.addEventListener('keyup',function(e){if(e.key===' '){e.preventDefault();onUp();}});

// ══════ RESULT ══════
function getComment(d){
  if(d<5)return 'La moule a pas bouge...';
  if(d<30)return 'Mou du crabe !';
  if(d<100)return 'Pas mal - vise les FDP !';
  if(d<300)return 'Belle catapulte !';
  if(d<800)return 'ENORME !! Les FDP ont aide ?';
  if(d<2000)return 'LEGENDAIRE !!';
  if(d<4000)return 'LA MOULE EST EN MER !!';
  if(d<5000)return 'EN IRLANDE !!';
  if(d<6000)return '★ ZONE DE GLOIRE ★';
  if(d<6010)return 'HOMMAGE A NOS CHAMPIONS';
  if(d<7000)return 'TU AS DEPASSE PLOUPLOU & SEBITCH !!!';
  if(d<8500)return 'LA MOULE EST EN ORBITE !!!';
  return 'CONQUERANT DE L\'ESPACE !!!';
}
function showResult(){
  if(M.dist>sessionRecord)sessionRecord=M.dist;
  document.getElementById('resName').textContent=playerName.toUpperCase();
  document.getElementById('resDist').textContent=M.dist+' METRES';
  document.getElementById('resComment').textContent=getComment(M.dist);
  // Reset visibilité de la box insta (cachée par défaut)
  var box=document.getElementById('topInstaBox');
  if(box)box.classList.add('hidden');
  var instaIn=document.getElementById('instaInput');
  if(instaIn)instaIn.value='';
  show(sResult);
  // On sauvegarde, puis on vérifie si on est dans le top 10
  saveScore(playerName,M.dist).then(function(){
    checkTop10AndRevealInsta();
  });
  stopBGM();
}

// ══════ SCREENS ══════
var sMenu=document.getElementById('sMenu'),sResult=document.getElementById('sResult'),sLb=document.getElementById('sLb');
function show(s){[sMenu,sResult,sLb].forEach(function(x){x.classList.add('hidden');});s.classList.remove('hidden');}
function hideAll(){[sMenu,sResult,sLb].forEach(function(x){x.classList.add('hidden');});}
function startGame(){resetAll();newSession();gState='play';hideAll();startBGM();}

document.getElementById('btnPlay').onclick=function(){
  var inp=document.getElementById('nameInput');
  var n=inp.value.trim();
  if(!n){
    inp.focus();
    inp.placeholder='ENTRE TON PSEUDO !';
    inp.style.borderColor='#ff3030';
    inp.style.boxShadow='0 0 12px #ff3030';
    setTimeout(function(){inp.style.borderColor='';inp.style.boxShadow='';inp.placeholder='TON PSEUDO';},1500);
    return;
  }
  playerName=n;
  getAC();
  startGame();
};
document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btnPlay').click();});
document.getElementById('btnReplay').onclick=function(){getAC();startGame();};
document.getElementById('btnLbRes').onclick=function(){showLb();};
document.getElementById('btnLbMenu').onclick=function(){showLb();};
document.getElementById('btnBack').onclick=function(){show(sMenu);};

// Confirmer l'insta (apparaît uniquement si top 10)
document.getElementById('btnConfirmInsta').onclick=function(){
  var b=this;
  var inp=document.getElementById('instaInput');
  var v=inp.value.trim();
  if(!v){inp.focus();return;}
  b.disabled=true;b.textContent='ENVOI...';
  updateInsta(v).then(function(){
    b.textContent='✓ ENREGISTRÉ';
    inp.disabled=true;
  }).catch(function(){
    b.textContent='ERREUR';
    setTimeout(function(){b.disabled=false;b.textContent='CONFIRMER';},1500);
  });
};

// Partage du score
document.getElementById('btnShare').onclick=function(){
  var b=document.getElementById('btnShare');
  var orig=b.textContent;
  var text='J\'ai fait '+M.dist+'m à La Moule Volante ★ Bats-moi sur fdp.bzh !';
  var url='https://fdp.bzh';
  function copyFallback(){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text+' '+url).then(function(){
        b.textContent='✓ COPIÉ !';setTimeout(function(){b.textContent=orig;},1500);
      });
    }
  }
  if(navigator.share){
    navigator.share({title:'La Moule Volante',text:text,url:url}).catch(copyFallback);
  }else{copyFallback();}
};

function showLb(){
  show(sLb);
  document.getElementById('lbContent').innerHTML='<p class="loader">CHARGEMENT...</p>';
  loadScores().then(function(scores){
    var medals=['1er','2e','3e'],rc=['rank-gold','rank-silver','rank-bronze'];
    if(!scores||!scores.length){document.getElementById('lbContent').innerHTML='<p class="sub">Joue une partie d\'abord !</p>';return;}
    var html='<table class="lb-table"><thead><tr><th>#</th><th>NOM</th><th>DIST</th></tr></thead><tbody>';
    scores.slice(0,10).forEach(function(sc,i){html+='<tr class="'+(sc.name===playerName.toUpperCase()?'me':'')+'"><td class="'+(rc[i]||'')+'">'+(medals[i]||i+1)+'</td><td>'+sc.name+'</td><td>'+sc.score+'m</td></tr>';});
    document.getElementById('lbContent').innerHTML=html+'</tbody></table>';
  }).catch(function(){
    document.getElementById('lbContent').innerHTML='<p class="sub">Erreur de chargement</p>';
  });
}

// Variable utilisée par l'auto-explode <14m (sursis 800ms après lancement)
var flightStartT=0;

// === FEU D'ARTIFICE quand le record est battu ===
var fireworks=[];
var topBeaten=false;
function spawnFireworkBurst(wx,wy){
  var cols=['#ff3030','#ffd700','#80c0ff','#ff80c0','#ffec80','#80ff80','#ff8030'];
  var c=cols[Math.floor(Math.random()*cols.length)];
  for(var i=0;i<35;i++){
    var ang=Math.random()*Math.PI*2;
    var spd=2+Math.random()*5;
    fireworks.push({
      wx:wx,wy:wy,
      vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      life:1.5,sz:2+Math.random()*2,
      col:Math.random()<.7?c:'#ffffff'
    });
  }
}
function updateFireworks(){
  for(var i=fireworks.length-1;i>=0;i--){
    var p=fireworks[i];
    p.wx+=p.vx;p.wy+=p.vy;p.vy+=0.08;p.life-=0.022;p.sz*=0.985;
    if(p.life<=0||p.sz<.4)fireworks.splice(i,1);
  }
}
function drawFireworks(){
  fireworks.forEach(function(p){
    var sx=toSX(p.wx);
    if(sx<-20||sx>W+20)return;
    ctx.globalAlpha=Math.min(p.life,1);
    ctx.fillStyle=p.col;
    ctx.fillRect(sx-p.sz/2,p.wy-p.sz/2,p.sz,p.sz);
  });
  ctx.globalAlpha=1;
}
function checkBeatTop(){
  if(!topScore||topBeaten)return;
  if(M.dist>topScore.score){
    topBeaten=true;
    // Salve initiale
    spawnFireworkBurst(M.wx-30,M.wy-20);
    spawnFireworkBurst(M.wx+10,M.wy-50);
    spawnFireworkBurst(M.wx+40,M.wy-10);
    // Salves supplémentaires différées
    setTimeout(function(){spawnFireworkBurst(M.wx-50,M.wy-40);},350);
    setTimeout(function(){spawnFireworkBurst(M.wx+30,M.wy-30);},700);
    setTimeout(function(){spawnFireworkBurst(M.wx,M.wy-20);},1100);
  }
}

show(sMenu);
loadCount();
loadTopScore(); // charge le champion actuel pour afficher son squelette en jeu
requestAnimationFrame(loop);
</script>
