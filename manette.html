var bigQ={q:function(a,b,w,h,col){bx.fillStyle=col;bx.fillRect(Math.round(44+SLIDE*10+a*10),Math.round(92+b*10),Math.max(1,Math.round(w*10)),Math.max(1,Math.round(h*10)));},cls:function(){bx.fillStyle='#0a0712';bx.fillRect(0,0,88,104);}};
var dots=document.getElementById('pdots');
PERSOS.forEach(function(){dots.appendChild(document.createElement('i'));});
function syncUI(){document.getElementById('pnom').textContent=PERSOS[idx].n;
 [].forEach.call(dots.children,function(d,i){d.className=(i===idx)?'on':'';});}
function setPerso(i,sl){idx=(i+PERSOS.length)%PERSOS.length;SLIDE=sl||0;perso=PERSOS[idx].id;
 try{localStorage.setItem('mvf_perso',perso);}catch(e){}
 if(navigator.vibrate)navigator.vibrate(15);
 if(joined)send({t:'perso',id:ID,v:perso});
 syncUI();}
document.getElementById('aL').addEventListener('pointerdown',function(e){e.preventDefault();setPerso(idx-1,-4.5);});
document.getElementById('aR').addEventListener('pointerdown',function(e){e.preventDefault();setPerso(idx+1,4.5);});
var swx=null,carEl=document.getElementById('car');
carEl.addEventListener('pointerdown',function(e){swx=e.clientX;});
window.addEventListener('pointerup',function(e){if(swx===null)return;var d=e.clientX-swx;swx=null;if(Math.abs(d)>35)setPerso(idx+(d<0?1:-1),d<0?4.5:-4.5);});
syncUI();
(function loop(ts){var t=(ts||0)/1000;bigQ.cls();if(Math.abs(SLIDE)>0.1)SLIDE*=0.78;else SLIDE=0;PERSOS[idx].d(bigQ.q,t);requestAnimationFrame(loop);})(0);

var client=window.supabase.createClient(SB_URL,SB_KEY);
var ch=client.channel('manette-fdp');
function send(o){try{ch.send({type:'broadcast',event:'msg',payload:o});}catch(e){}}
ch.on('broadcast',{event:'msg'},function(p){handle(p.payload||{});}).subscribe(function(st){
 if(st==='SUBSCRIBED')$('status').textContent='Connecté. Entre ton pseudo !';
});

function handle(m){
 if(m.t!=='state')return;
 lastState=Date.now();
 if(!joined)return;
 var inQ=-1;(m.q||[]).forEach(function(q,i){if(q.id===ID)inQ=i;});
 if(m.cur===ID){
  if(!isMyTurn&&navigator.vibrate)navigator.vibrate([80,40,80]);
  isMyTurn=true;
  $('pos').textContent='C’EST À TOI ' + myName + ' !';
  $('fire').classList.add('on');$('fire').disabled=false;
  $('status').textContent='Regarde la façade et TIRE !';
 } else {
  isMyTurn=false;
  $('fire').classList.remove('on');$('fire').disabled=true;
  if(inQ>=0){$('pos').textContent='POSITION '+(inQ+1)+' / '+m.q.length;$('status').textContent=(m.curN?('En jeu : '+m.curN):'En attente d’un joueur...');}
  else{
   if(Date.now()-lastJoinSend>3500){lastJoinSend=Date.now();send({t:'join',id:ID,n:myName,v:perso});}
   $('pos').textContent='REPRISE DE TA PLACE...';
  }
 }
}
$('join').addEventListener('click',function(){
 var v=($('pseudo').value||'').trim().toUpperCase().slice(0,10);
 if(!v){$('pseudo').style.border='2px solid #ff5530';$('pseudo').focus();return;}
 myName=v;try{localStorage.setItem('mvf_pseudo',v);}catch(e){}
 joined=true;lastJoinSend=Date.now();send({t:'join',id:ID,n:v,v:perso});
 $('joinbox').classList.add('hide');$('pos').classList.remove('hide');$('fire').classList.remove('hide');
 $('pos').textContent='Inscription...';$('status').textContent='Garde cette page ouverte !';
});
$('fire').addEventListener('pointerdown',function(e){
 e.preventDefault();
 if(!isMyTurn)return;
 send({t:'fire',id:ID});
 if(navigator.vibrate)navigator.vibrate(30);
});
window.addEventListener('pagehide',function(){if(joined)send({t:'leave',id:ID});});
setInterval(function(){
 if(joined&&lastState&&Date.now()-lastState>9000){$('status').textContent='Façade hors ligne... réessaie plus tard';$('fire').classList.remove('on');$('fire').disabled=true;}
},3000);
</script>
</body>
