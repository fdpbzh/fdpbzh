#pdots i{width:6px;height:6px;border-radius:50%;background:var(--line-soft);font-style:normal}
#pdots i.on{background:var(--gold)}
#joinbox{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:300px}
input{font-family:inherit;font-size:15px;font-weight:600;padding:14px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;color:var(--cream);text-align:center;text-transform:uppercase;outline:none}

input:focus{border-color:var(--gold)}
#join{font-family:inherit;font-size:14px;font-weight:700;padding:15px;width:100%;background:var(--lav);color:#1A0A40;border:none;border-radius:14px;cursor:pointer;letter-spacing:.02em}

#fire{font-family:inherit;width:100%;max-width:300px;height:74px;font-size:17px;font-weight:700;letter-spacing:.1em;color:#5a4f93;background:var(--card);border:1px solid var(--line);border-radius:16px;cursor:pointer;flex:none;transition:transform .08s}
#fire.on{background:var(--gold);color:#3a2a02;border-color:var(--gold);animation:glow 1.1s infinite}
#fire.on:active{transform:scale(.97)}

#status{font-size:12px;font-weight:500;color:var(--lav-soft);line-height:1.5;min-height:34px;max-width:300px}
.hide{display:none}

}
