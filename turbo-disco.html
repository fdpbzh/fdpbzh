*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0d0014;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;overflow:hidden;touch-action:none;}
#wrap{position:relative;width:min(100vw,calc(100vh*9/16));height:min(100vh,calc(100vw*16/9));max-width:400px;max-height:710px;}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated;border:2px solid #6b21a8;box-shadow:0 0 30px #c026d355;touch-action:none;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,0,20,0.93);gap:10px;padding:18px;z-index:20;overflow-y:auto;}

.screen.hidden{display:none;}
.hidden{display:none !important;}
h1{font-size:clamp(13px,3.5vw,20px);color:#f0abfc;text-align:center;text-shadow:3px 3px #6b21a8,0 0 18px #c026d3;line-height:1.7;}
.sub{font-size:clamp(5px,1.5vw,8px);color:#d8b4fe;text-align:center;line-height:2.2;}
.big{font-size:clamp(9px,2.5vw,14px);color:#ffd700;text-shadow:0 0 10px #ffd700;text-align:center;}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,10px);padding:10px 18px;background:#6b21a8;color:#fff;border:2px solid #f0abfc;cursor:pointer;animation:blink 1s step-end infinite;}
.btn:active{background:#c026d3;animation:none;}
.btn-sm{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.4vw,8px);padding:6px 12px;background:#1e0030;color:#f0abfc;border:1px solid #6b21a8;cursor:pointer;}
.btn-sm:active{background:#6b21a8;}
input[type=text]{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.8vw,10px);padding:8px;background:#1e0030;color:#f0abfc;border:2px solid #6b21a8;outline:none;width:min(180px,60%);text-align:center;}
input[type=text]::placeholder{color:#7c3f9e;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.lb-table{width:100%;border-collapse:collapse;font-size:clamp(5px,1.3vw,7px);color:#f0abfc;}
.lb-table th{color:#ffd700;padding:3px 5px;border-bottom:1px solid #6b21a8;}
.lb-table td{padding:4px 5px;border-bottom:1px solid #2a004a;}
.lb-table tr.me td{color:#fff;background:#2a004a;}
.rank-gold{color:#ffd700}.rank-silver{color:#c0c0c0}.rank-bronze{color:#cd7f32}
.loader{font-size:6px;color:#7c3f9e;animation:blink .6s step-end infinite;}
#hudTimer{position:absolute;top:8px;left:10px;z-index:10;font-size:clamp(9px,2.4vw,15px);color:#fff;text-shadow:2px 2px #6b21a8;pointer-events:none;}
#hudTimer.run{color:#ffd700;text-shadow:2px 2px #6b21a8,0 0 10px #ffd700;}
#hudLap{position:absolute;top:8px;right:10px;z-index:10;font-size:clamp(5px,1.4vw,8px);color:#d8b4fe;pointer-events:none;text-align:right;}
#hudBar{position:absolute;top:26px;right:10px;z-index:10;width:clamp(60px,18vw,110px);height:5px;background:#1e0030;border:1px solid #6b21a8;pointer-events:none;}
#hudBarFill{height:100%;width:0%;background:#c026d3;box-shadow:0 0 5px #c026d3;}
#hudMsg{position:absolute;bottom:8px;left:0;right:0;z-index:10;text-align:center;font-size:clamp(5px,1.4vw,8px);color:#d8b4fe;pointer-events:none;line-height:2;}
#hudMsg.go{color:#ffd700}
#hudMsg.bad{color:#ff4d6d}
#btnMute{position:absolute;bottom:6px;right:8px;z-index:15;font-family:'Press Start 2P',monospace;font-size:8px;background:transparent;border:none;color:#7c3f9e;cursor:pointer;padding:4px;}
#btnMute:active{color:#f0abfc;}

<script>
// ══════ SUPABASE ══════
var SB_URL='https://nhsroymqvwrjflagzznz.supabase.co/rest/v1';  // projet fdp-scores (commun a tous les jeux FDP)
var SB_KEY='sb_publishable_UH528FgC5FVbxNFYi9Odlg_jcPZuK4J';
var TABLE='turbo_scores';

var MIN_TIME_MS=600, MAX_TIME_MS=180000, MIN_PLAY_MS=1500, MIN_ACTIONS=25;

function sbHeaders(extra){
  var h={apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY};
  if(extra)for(var k in extra)h[k]=extra[k];
  return h;
}

var sessionToken=null, sessionStartTime=0, actionCount=0;
function newSession(){
  sessionToken='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);
  });
  sessionStartTime=Date.now(); actionCount=0;
}
function trackAction(){actionCount++;}

var lastScoreId=null;
function loadScores(){
  return fetch(SB_URL+'/'+TABLE+'?select=name,time_ms&order=time_ms.asc&limit=10',{headers:sbHeaders()})
    .then(function(r){return r.json();}).catch(function(){return[];});
}
var topScore=null;
function loadTopScore(){
  return fetch(SB_URL+'/'+TABLE+'?select=name,time_ms&order=time_ms.asc&limit=1',{headers:sbHeaders()})
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.length)topScore=d[0];}).catch(function(){});
}
function saveScore(name,ms){
  if(!sessionToken)return Promise.resolve(null);
  var playTime=Date.now()-sessionStartTime;
  if(playTime<MIN_PLAY_MS)return Promise.resolve(null);
  if(ms<MIN_TIME_MS||ms>MAX_TIME_MS)return Promise.resolve(null);
  if(actionCount<MIN_ACTIONS)return Promise.resolve(null);
  var body={name:name.toUpperCase().slice(0,12),time_ms:Math.round(ms),insta:null,
            session_id:sessionToken,play_time_ms:playTime,action_count:actionCount};
  return fetch(SB_URL+'/'+TABLE,{method:'POST',
    headers:sbHeaders({'Content-Type':'application/json','Prefer':'return=representation'}),
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    sessionToken=null;
    if(d&&d[0]&&d[0].id)lastScoreId=d[0].id;
    loadCount(); loadTopScore();
    return d&&d[0]?d[0]:null;
  }).catch(function(){return null;});
}
function updateInsta(insta){
  if(!lastScoreId)return Promise.resolve();
  if(insta.charAt(0)==='@')insta=insta.substring(1);
  insta=insta.trim().slice(0,30);
  if(!insta)return Promise.resolve();
  return fetch(SB_URL+'/'+TABLE+'?id=eq.'+lastScoreId,{method:'PATCH',
    headers:sbHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}),
    body:JSON.stringify({insta:insta})
  }).then(function(){lastScoreId=null;}).catch(function(){});
}
function checkTop10AndRevealInsta(ms){
  loadScores().then(function(s){
    if(!s||s.length===0)return;
    var q = s.length<10 ? true : ms<=s[s.length-1].time_ms;
    if(q){var b=document.getElementById('topInstaBox');if(b)b.classList.remove('hidden');}
  });
}
var totalGames=0;
function loadCount(){
  return fetch(SB_URL+'/'+TABLE+'?select=*',{method:'HEAD',
    headers:sbHeaders({'Prefer':'count=exact','Range':'0-0'})
  }).then(function(r){
    var range=r.headers.get('content-range');
    if(range){var m=range.match(/\/(\d+)/);if(m)totalGames=parseInt(m[1]);}
    var el=document.getElementById('gameCount');
    if(el)el.textContent=totalGames+' TOURS BOUCLÉS';
  }).catch(function(){});
}

          [N.C3,.5],[N.C3,.25],[N.C4,.25],[N.C3,.5],[N.G3,.5],
          [N.G2,.5],[N.G2,.25],[N.G3,.25],[N.G2,.5],[N.D3,.5]];
var ARP=[[N.A4,.25],[N.C5,.25],[N.E5,.25],[N.C5,.25],[N.A4,.25],[N.C5,.25],[N.E5,.25],[N.C5,.25],

var LEAD=[[N._,2],[N._,2],[N.E5,.5],[N.D5,.5],[N.C5,.5],[N.A4,.5],[N._,2],[N.C5,.5],[N.D5,.5],[N.E5,1]];
var DRUMS=[{t:'k',d:.25},{t:'h',d:.25},{t:'k',d:.25},{t:'oh',d:.25},

           {t:'k',d:.25},{t:'h',d:.25},{t:'k',d:.25},{t:'oh',d:.25}];
function oscNote(f,st,dur,ty,vol){
  if(!f)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(masterGain);
  o.type=ty||'square';o.frequency.value=f;
  g.gain.setValueAtTime(0,st);
  g.gain.linearRampToValueAtTime(vol||0.18,st+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,st+dur-0.02);
  o.start(st);o.stop(st+dur);
}
function noiseHit(st,dur,freq,vol){
  var buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  var src=ac.createBufferSource();src.buffer=buf;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=freq||200;f.Q.value=0.5;
  var g=ac.createGain();src.connect(f);f.connect(g);g.connect(masterGain);
  g.gain.setValueAtTime(vol||0.3,st);g.gain.exponentialRampToValueAtTime(0.001,st+dur);
  src.start(st);src.stop(st+dur);
}
function scheduleBGM(){
  if(!bgmPlaying)return;
  var now=ac.currentTime,LA=0.25,n,d;
  while(bassT<now+LA){n=BASS[bassIdx%BASS.length];d=n[1]*BEAT;oscNote(n[0],bassT,d,'square',0.20);bassT+=d;bassIdx++;}
  while(arpT<now+LA){n=ARP[arpIdx%ARP.length];d=n[1]*BEAT;oscNote(n[0],arpT,d,'triangle',0.075);arpT+=d;arpIdx++;}
  while(leadT<now+LA){n=LEAD[leadIdx%LEAD.length];d=n[1]*BEAT;oscNote(n[0],leadT,d,'square',0.11);leadT+=d;leadIdx++;}
  while(drumT<now+LA){
    n=DRUMS[drumIdx%DRUMS.length];d=n.d*BEAT;
    if(n.t==='k'){noiseHit(drumT,d*.7,65,0.30);oscNote(72,drumT,d*.3,'sine',0.20);}
    if(n.t==='s'){noiseHit(drumT,d*.5,1500,0.18);}
    if(n.t==='h'){noiseHit(drumT,d*.2,9500,0.05);}
    if(n.t==='oh'){noiseHit(drumT,d*.55,9000,0.09);}
    drumT+=d;drumIdx++;
  }
  bgmTimer=setTimeout(scheduleBGM,60);
}
function startBGM(){
  if(muted)return;
  getAC();if(ac.state==='suspended')ac.resume();
  if(bgmPlaying)return;bgmPlaying=true;
  var now=ac.currentTime+0.05;
  bassT=now;arpT=now;drumT=now;leadT=now;
  bassIdx=0;arpIdx=0;drumIdx=0;leadIdx=0;
  scheduleBGM();
}
function stopBGM(){bgmPlaying=false;clearTimeout(bgmTimer);}
function sfxStart(){if(muted)return;getAC();[523,659,784].forEach(function(f,i){oscNote(f,ac.currentTime+i*.05,.08,'square',.16);});}
function sfxCrash(){if(muted)return;getAC();noiseHit(ac.currentTime,.25,300,0.30);oscNote(120,ac.currentTime,.22,'sawtooth',.16);oscNote(70,ac.currentTime+.1,.25,'square',.10);}
function sfxWin(){if(muted)return;getAC();[523,659,784,1047,1319].forEach(function(f,i){oscNote(f,ac.currentTime+i*.07,.10,'square',.17);});}
function sfxTick(){if(muted||!ac)return;oscNote(1200,ac.currentTime,.02,'square',.03);}

document.getElementById('btnMute').addEventListener('click',function(e){
  e.stopPropagation();

});

// Portrait : la grille (80 colonnes × 40 lignes, voiture horizontale) est
// dessinée tournée de 90° horaire → à l'écran la voiture est verticale.
var CPW=CR*GP, CPH=CC*GP;   // 80 x 160 — f_max carrosserie = 0.669 < 0.72

// Pré-rendu de la voiture (ombre incluse) dans un canvas hors écran
var CAR_CANVAS=document.createElement('canvas');
CAR_CANVAS.width=CPW+6; CAR_CANVAS.height=CPH+6;
(function prerenderCar(){
  var g=CAR_CANVAS.getContext('2d');
  g.imageSmoothingEnabled=false;
  var r,c,ch;
  // ombre
  g.globalAlpha=0.32; g.fillStyle='#000';
  for(r=0;r<CR;r++){var row=CAR_ROWS[r];
    for(c=0;c<CC;c++){ch=row.charAt(c);
      if(ch!=='.')g.fillRect((CR-1-r)*GP+5,c*GP+5,GP,GP);
    }}
  g.globalAlpha=1;
  // pixels
  var CH="0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for(r=0;r<CR;r++){var row=CAR_ROWS[r];
    for(c=0;c<CC;c++){ch=row.charAt(c);
      if(ch==='.')continue;
      g.fillStyle=CAR_PAL[CH.indexOf(ch)];
      g.fillRect((CR-1-r)*GP,c*GP,GP,GP);
    }}
})();

// Boule disco : flanc droit de l'écran, légèrement au-dessus du milieu
// (jeu au pouce droit en portrait ; les gauchers tournent dans l'autre sens, autorisé)
var SB_TH=-15*Math.PI/180;
var SBX=CX+RX*Math.cos(SB_TH), SBY=CY+RY*Math.sin(SB_TH), SBR=15;

var COL={
  asphalt1:'#150022', asphalt2:'#1e0030',
  track:'#2a0a45', trackEdge:'#6b21a8', dash:'#4a1a75',
  trail:'#ffd700', trailBad:'#ff4d6d', trailWin:'#7effa0'
};

// ══════ CRABES : sprites pré-rendus ══════
// 300 crabes × ~30 fillRect = trop lourd en direct.
// On pré-rend 2 directions de regard × 6 frames d'animation, puis 300 drawImage.
var SPR_W=42, SPR_H=38, SPR_OX=19, SPR_OY=24;
var SPRITES=[[],[]];
(function buildCrabSprites(){
  for(var dir=0;dir<2;dir++){
    for(var f=0;f<6;f++){
      var oc=document.createElement('canvas');
      oc.width=SPR_W;oc.height=SPR_H;
      var g=oc.getContext('2d');
      g.imageSmoothingEnabled=false;
      drawCrabInto(g,SPR_OX,SPR_OY,3,f/6,dir?1:-1);
      SPRITES[dir].push(oc);
    }
  }
})();

function drawCrabInto(g,cx,cy,s,k,look){
  function q(x,y,w,h,col){g.fillStyle=col;g.fillRect(Math.round(cx+x),Math.round(cy+y),Math.max(1,Math.round(w)),Math.max(1,Math.round(h)));}
  var ph=k*Math.PI*2;
  var twitch=Math.sin(ph)*1.4;
  var open=(0.5+0.5*Math.sin(ph))*s*0.7;
  var legJ=Math.sin(ph*2)*1.1;
  // pattes
  q(-s*4.5,-s*1+legJ*.6,s,s*1.5,'#902010');
  q(-s*4,  s*0.3+legJ,   s,s*1.5,'#902010');
  q(-s*4.5,s*1.5-legJ*.4,s,s*1.2,'#902010');
  q(s*3.5,-s*1-legJ*.6,  s,s*1.5,'#902010');
  q(s*3,   s*0.3-legJ,   s,s*1.5,'#902010');
  q(s*3.5, s*1.5+legJ*.4,s,s*1.2,'#902010');
  // pinces
  q(-s*3.5,-s*2.5,s*0.8,s,'#a02808');
  q(-s*4,  -s*3.5,s*1.5,s,'#a02808');
  q(-s*4.2,-s*4.3-open+twitch,s*1.8,s*0.8,'#c82810');
  q(-s*4.2,-s*3+open*.4-twitch,s*1.8,s*0.4,'#c82810');
  q(s*2.7,-s*2.5,s*0.8,s,'#a02808');
  q(s*2.5,-s*3.5,s*1.5,s,'#a02808');
  q(s*2.4,-s*4.3-open-twitch,s*1.8,s*0.8,'#c82810');
  q(s*2.4,-s*3+open*.4+twitch,s*1.8,s*0.4,'#c82810');
  // carapace
  q(-s*2.5, s*1,  s*5,  s,    '#902010');
  q(-s*3,  -s*0.5,s*6,  s*1.7,'#b02010');
  q(-s*2.5,-s*1.5,s*5,  s*1.2,'#c82010');
  q(-s*2,  -s*2,  s*4,  s*0.7,'#e03020');
  q(-s,    -s*2,  s*2,  s*0.5,'#ff5530');
  // tiges oculaires
  q(-s*1.3,-s*2.8,s*0.5,s*0.8,'#902010');
  q( s*0.8,-s*2.8,s*0.5,s*0.8,'#902010');
  // yeux + pupilles orientées
  q(-s*1.6,-s*3.5,s,s,'#0a0a0a');
  q( s*0.6,-s*3.5,s,s,'#0a0a0a');
  var lx=look*s*0.35;
  q(-s*1.4+lx,-s*3.3,s*0.4,s*0.4,'#fff');
  q( s*0.8+lx,-s*3.3,s*0.4,s*0.4,'#fff');
}

// ══════ FOULE : ~380 crabes, densité uniforme ══════
// Pas d'anneau rangé : échantillonnage uniforme sur tout le canvas avec
// espacement minimal, en rejetant tout crabe dont le corps mordrait sur le
// couloir. L'ovale n'est pas dessiné : il émerge comme la clairière que la
// foule ne peut pas envahir, avec un bord naturellement irrégulier.
// (validé par simulation : bord de clairière f∈[1.27,1.46] sur 24 secteurs, 0 trou)
var CRABS=[];
(function buildCrowd(){
  var tries=0;
  while(CRABS.length<380 && tries<25000){
    tries++;
    var x=-24+Math.random()*(W+48);
    var y=-24+Math.random()*(H+48);
    var sc=0.84+Math.random()*0.56;
    // point du corps le plus proche du centre
    var dx=x-CX, dy=y-CY;
    var L=Math.hypot(dx,dy)||1;
    var m=22*sc;
    var bx=x-dx/L*m, by=y-dy/L*m;
    var f=Math.hypot((bx-CX)/RX,(by-CY)/RY);
    if(f<F_OUT+0.02) continue;           // mordrait sur le couloir
    var ok=true;                          // espacement minimal
    for(var i=0;i<CRABS.length;i++){
      var o=CRABS[i];
      if((x-o.x)*(x-o.x)+(y-o.y)*(y-o.y)<361){ok=false;break;}
    }
    if(!ok) continue;
    CRABS.push({x:x,y:y,sc:sc,
                ph:Math.random(),sp:0.55+Math.random()*1.1,
                dir:(x<CX)?1:0});
  }
  CRABS.sort(function(a,b){return a.y-b.y;});
})();

// ══════ ÉTAT ══════
var phase='menu';
var t0=0, elapsed=0, acc=0, lastAng=null, startAng=null;
var trail=[], lapDone=false, discoAng=0;
var playerName='ANONYME', deathReason='';
try{playerName=localStorage.getItem('td_name')||'ANONYME';}catch(e){}
var flashT=0, confetti=[], lastTickPc=-1;

var hudTimer=document.getElementById('hudTimer');
var hudLap=document.getElementById('hudLap');
var hudBarFill=document.getElementById('hudBarFill');
var hudMsg=document.getElementById('hudMsg');

function fmt(ms){
  var s=Math.floor(ms/1000), m=Math.floor(ms%1000);
  return (s<10?'0':'')+s+'.'+(m<100?(m<10?'00':'0'):'')+m;
}
function resetRun(){
  phase='ready'; elapsed=0; acc=0; lastAng=null; startAng=null;
  trail=[]; lapDone=false; confetti=[]; flashT=0; deathReason=''; lastTickPc=-1;
  hudTimer.className=''; hudTimer.textContent='00.000';
  hudLap.textContent='TOUR 0%';
  hudBarFill.style.width='0%'; hudBarFill.style.background='#c026d3';
  hudMsg.className=''; hudMsg.textContent='POSE TON DOIGT SUR LA BOULE DISCO';
}

// ══════ DESSIN ══════
function px(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x|0,y|0,Math.max(1,w|0),Math.max(1,h|0));}

function drawFloor(){
  ctx.fillStyle=COL.asphalt1;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=COL.asphalt2;
  for(var x=0;x<W;x+=30)for(var y=0;y<H;y+=30)
    if(((x/30)+(y/30))%2===0)ctx.fillRect(x,y,30,30);
}

function drawDiscoBeams(t){
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  var cols=['#c026d3','#ffd700','#60efff','#f0abfc','#7effa0','#ff6b9d'];
  for(var i=0;i<6;i++){
    var a=t*0.0006+(i/6)*Math.PI*2;
    ctx.globalAlpha=0.05+0.03*Math.sin(t*0.003+i);
    ctx.fillStyle=cols[i];
    ctx.beginPath();ctx.moveTo(SBX,SBY);
    ctx.arc(SBX,SBY,900,a,a+0.18);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawCar(){
  ctx.drawImage(CAR_CANVAS, CX-CPW/2, CY-CPH/2);
}

function drawCrowd(t){
  for(var i=0;i<CRABS.length;i++){
    var cb=CRABS[i];
    var f=((t*0.004*cb.sp+cb.ph*6)|0)%6;
    var w=SPR_W*cb.sc, h=SPR_H*cb.sc;
    ctx.drawImage(SPRITES[cb.dir][f], cb.x-w*0.45, cb.y-h*0.6, w, h);
  }
}

function drawTrail(){
  if(trail.length<2)return;
  var col = phase==='dead'?COL.trailBad : (phase==='done'?COL.trailWin:COL.trail);
  ctx.lineCap='round';ctx.lineJoin='round';
  for(var i=1;i<trail.length;i++){
    ctx.globalAlpha=.10+(i/trail.length)*.85;
    ctx.strokeStyle=col;ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x,trail[i-1].y);
    ctx.lineTo(trail[i].x,trail[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  var hd=trail[trail.length-1];
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(hd.x,hd.y,3.5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.4;
  ctx.beginPath();ctx.arc(hd.x,hd.y,7,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
}

function drawDiscoBall(t){
  var r=SBR, fr, fq;
  var pulse=.5+.5*Math.sin(t*0.005);
  var g=ctx.createRadialGradient(SBX,SBY,0,SBX,SBY,r*3.4);
  g.addColorStop(0,'rgba(255,255,255,'+(0.30*pulse)+')');
  g.addColorStop(.5,'rgba(185,190,205,'+(0.14*pulse)+')');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(SBX,SBY,r*3.4,0,Math.PI*2);ctx.fill();

  // Facettes gris/blanc — boule à facettes réaliste, seule la lumière ambiante colore la scène
  var fc=['#ffffff','#e8eaf0','#c9ccd8','#9aa0b0','#f4f5f8','#b4bac8'];
  var F=7, spin=discoAng;
  for(fr=0;fr<F;fr++){
    for(fq=0;fq<F;fq++){
      var a0=(fq/F)*Math.PI*2+spin;
      if(Math.cos(a0)<-0.15)continue;
      var e0=(fr/F)-.5, e1=((fr+.85)/F)-.5;
      var rr=r*Math.cos(e0*Math.PI);
      var y0=SBY+r*Math.sin(e0*Math.PI), y1=SBY+r*Math.sin(e1*Math.PI);
      ctx.globalAlpha=.35+.65*Math.max(0,Math.cos(a0+0.4));
      px(SBX+Math.cos(a0)*rr-2,y0,4,Math.max(2,y1-y0),fc[(fr+fq+((spin*2)|0))%fc.length]);
    }
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='#e8eaf0';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(SBX,SBY,r,0,Math.PI*2);ctx.stroke();
  for(var i=0;i<8;i++){
    var ra=(i/8)*Math.PI*2+spin*1.4;
    var ri=r+3+Math.sin(t*0.007+i)*2;
    var ro=ri+4+Math.sin(t*0.009+i*1.3)*3;
    ctx.strokeStyle=fc[i%fc.length];
    ctx.globalAlpha=.4+.5*Math.sin(t*0.008+i);
    ctx.beginPath();
    ctx.moveTo(SBX+Math.cos(ra)*ri,SBY+Math.sin(ra)*ri);
    ctx.lineTo(SBX+Math.cos(ra)*ro,SBY+Math.sin(ra)*ro);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  if(phase==='ready'&&((t/450)|0)%2===0){
    ctx.fillStyle='#ffd700';ctx.font='7px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText('START',SBX,SBY-r-8);
    ctx.textAlign='left';
  }
}

function spawnConfetti(){
  for(var i=0;i<70;i++)confetti.push({
    x:CX+(Math.random()-.5)*300, y:-Math.random()*180,
    vy:1.6+Math.random()*3, vx:(Math.random()-.5)*1.4,
    c:['#ffd700','#f0abfc','#c026d3','#fff','#7effa0'][(Math.random()*5)|0],
    s:2+Math.random()*3
  });
}
function drawConfetti(){
  for(var i=confetti.length-1;i>=0;i--){
    var p=confetti[i];p.y+=p.vy;p.x+=p.vx;
    px(p.x,p.y,p.s,p.s,p.c);
    if(p.y>H+10)confetti.splice(i,1);
  }
}
function drawOverlayFX(t){
  if(phase==='done'&&((t/180)|0)%3===0){ctx.globalAlpha=.10;ctx.fillStyle='#7effa0';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(phase==='dead'&&flashT>0){ctx.globalAlpha=.14*(flashT/20);ctx.fillStyle='#ff4d6d';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flashT--;}
}
function drawGhostRecord(){
  if(!topScore)return;
  ctx.fillStyle='#7c3f9e';ctx.font='6px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('RECORD '+topScore.name+' '+fmt(topScore.time_ms),CX,H-36);
  ctx.textAlign='left';
}

// ══════ GÉOMÉTRIE / COLLISION ══════
function ellipseF(x,y){
  var dx=(x-CX)/RX, dy=(y-CY)/RY;
  return Math.sqrt(dx*dx+dy*dy);
}
function nearBall(x,y){return Math.hypot(x-SBX,y-SBY)<SBR*1.8;}
function angOf(x,y){return Math.atan2(y-CY,x-CX);}
function angDiff(a,b){var d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d;}

// ══════ INPUT ══════
// Suivi par identifiant de doigt : seul le doigt qui a démarré sur la boule
// disco pilote le jeu. Un 2e contact (paume, pouce qui tient le téléphone)
// est totalement ignoré, et son retrait ne termine pas la partie.
var activeTouchId=null;   // identifier du doigt de jeu (null = souris ou aucun)
var mouseActive=false;

function toCanvas(clientX,clientY){
  var r=canvas.getBoundingClientRect();
  return {x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height)};
}
function findTouch(list,id){
  for(var i=0;i<list.length;i++) if(list[i].identifier===id) return list[i];
  return null;
}

function beginRun(p){
  phase='running'; t0=performance.now();
  startAng=angOf(p.x,p.y); lastAng=startAng;
  trail=[{x:p.x,y:p.y}]; acc=0;
  hudTimer.className='run';
  hudMsg.className='go'; hudMsg.textContent='TOURNE ENTRE LA VOITURE ET LES CRABES !';
  sfxStart();
}

function stepRun(p){
  trackAction();
  trail.push(p); if(trail.length>600)trail.shift();
  discoAng=angOf(p.x,p.y);

  // Zone franche autour de la boule : impossible de mourir sur/près du départ.
  // Corrige les morts immédiates quand le clic/doigt démarre au bord de la boule
  // (nearBall accepte 27px du centre, mais la marge du couloir n'est que de ~23px).
  var f=ellipseF(p.x,p.y);
  if(Math.hypot(p.x-SBX,p.y-SBY)>SBR*2.4){
    if(f<F_IN){die('TROP PRÈS DE LA CORVETTE !');return;}
    if(f>F_OUT){die('TU AS BOUSCULÉ LES CRABES !');return;}
  }

  var a=angOf(p.x,p.y);
  acc+=angDiff(a,lastAng); lastAng=a;

  var prog=Math.min(Math.abs(acc)/(Math.PI*2),1);
  var pc=Math.round(prog*100);
  hudBarFill.style.width=pc+'%';
  hudLap.textContent='TOUR '+pc+'%';
  if(pc%25===0 && pc!==lastTickPc && pc>0){lastTickPc=pc;sfxTick();}

  if(!lapDone && Math.abs(acc)>=Math.PI*1.95 && Math.abs(angDiff(a,startAng))<0.35){
    lapDone=true; finish();
  }
}

// ── tactile ──
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(phase!=='ready')return;
  // cherche parmi les NOUVEAUX contacts celui qui est sur la boule
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    var p=toCanvas(t.clientX,t.clientY);
    if(nearBall(p.x,p.y)){
      activeTouchId=t.identifier;
      beginRun(p);
      return;
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(phase!=='running'||activeTouchId===null)return;
  var t=findTouch(e.touches,activeTouchId);
  if(!t)return;                      // le doigt de jeu n'a pas bougé, ignorer
  stepRun(toCanvas(t.clientX,t.clientY));
},{passive:false});

function touchEnd(e){
  if(phase!=='running'||activeTouchId===null)return;
  // ne mourir que si c'est LE doigt de jeu qui se lève
  if(findTouch(e.changedTouches,activeTouchId)){
    e.preventDefault();
    activeTouchId=null;
    die('DOIGT LEVÉ TROP TÔT !');
  }
}
canvas.addEventListener('touchend',touchEnd,{passive:false});
canvas.addEventListener('touchcancel',touchEnd,{passive:false});

// ── souris (desktop) ──
canvas.addEventListener('mousedown',function(e){
  e.preventDefault();
  if(phase!=='ready')return;
  var p=toCanvas(e.clientX,e.clientY);
  if(!nearBall(p.x,p.y))return;
  mouseActive=true;
  beginRun(p);
});
canvas.addEventListener('mousemove',function(e){
  if(phase!=='running'||!mouseActive)return;
  e.preventDefault();
  // bouton relâché hors fenêtre : le mouseup de window n'a pas été vu
  if(e.buttons===0){mouseActive=false;die('DOIGT LEVÉ TROP TÔT !');return;}
  stepRun(toCanvas(e.clientX,e.clientY));
});
window.addEventListener('mouseup',function(e){
  if(phase!=='running'||!mouseActive)return;
  mouseActive=false;
  die('DOIGT LEVÉ TROP TÔT !');
});

// ══════ FIN DE PARTIE ══════
function die(reason){
  phase='dead'; deathReason=reason; flashT=20;
  activeTouchId=null; mouseActive=false;
  hudTimer.className='';
  hudMsg.className='bad'; hudMsg.textContent=reason;
  sfxCrash();
  setTimeout(showResult,1100);
}
function finish(){
  phase='done';
  activeTouchId=null; mouseActive=false;
  elapsed=performance.now()-t0;
  hudTimer.className=''; hudTimer.textContent=fmt(elapsed);
  hudBarFill.style.width='100%'; hudBarFill.style.background='#7effa0';
  hudLap.textContent='TOUR 100%';
  hudMsg.className='go'; hudMsg.textContent='BOUCLÉ EN '+fmt(elapsed)+' !';
  sfxWin(); spawnConfetti();
  setTimeout(showResult,1500);
}
function comment(ms){
  if(ms<2500)return 'SURHUMAIN. ON VÉRIFIE LES CAMÉRAS.';
  if(ms<3500)return 'PILOTE DE LIGNE. RESPECT.';
  if(ms<5000)return 'PROPRE. TRÈS PROPRE.';
  if(ms<8000)return 'HONORABLE. LES CRABES APPLAUDISSENT.';
  if(ms<15000)return 'TU AS PRIS TON TEMPS. ÇA COMPTE AUSSI.';
  return 'TU AS VISITÉ LA VOITURE, PAS COURU AUTOUR.';
}
function showResult(){
  var ok=(phase==='done');
  document.getElementById('resName').textContent = ok ? '' : playerName;
  document.getElementById('topInstaBox').classList.add('hidden');
  document.getElementById('saveBox').classList.toggle('hidden',!ok);
  if(ok){
    var ni=document.getElementById('nameInput');
    ni.value = (playerName==='ANONYME') ? '' : playerName;
    document.getElementById('resTime').textContent=fmt(elapsed);
    document.getElementById('resComment').textContent=comment(elapsed);
  } else {
    document.getElementById('resTime').textContent='ÉLIMINÉ';
    document.getElementById('resComment').textContent=deathReason;
  }
  show('sResult');
}

// ══════ ÉCRANS ══════
function show(id){
  ['sMenu','sResult','sLb'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}
function hideAll(){['sMenu','sResult','sLb'].forEach(function(s){document.getElementById(s).classList.add('hidden');});}

document.getElementById('btnPlay').addEventListener('click',function(){
  startBGM(); newSession(); hideAll(); resetRun();
});
document.getElementById('btnSaveScore').addEventListener('click',function(){
  var n=document.getElementById('nameInput').value.trim();
  playerName = n ? n.toUpperCase().slice(0,12) : 'ANONYME';
  try{localStorage.setItem('td_name',playerName);}catch(e){}
  var b=this; b.disabled=true; b.textContent='...';
  saveScore(playerName,elapsed).then(function(saved){
    b.disabled=false; b.textContent='✔ ENREGISTRER MON TEMPS';
    document.getElementById('saveBox').classList.add('hidden');
    document.getElementById('resName').textContent=playerName;
    if(saved)checkTop10AndRevealInsta(elapsed);
  });
});
document.getElementById('btnReplay').addEventListener('click',function(){
  newSession(); hideAll(); resetRun();
});
document.getElementById('btnLbMenu').addEventListener('click',function(){renderLb();show('sLb');});
document.getElementById('btnLbRes').addEventListener('click',function(){renderLb();show('sLb');});
document.getElementById('btnBack').addEventListener('click',function(){show('sMenu');phase='menu';});
document.getElementById('btnConfirmInsta').addEventListener('click',function(){
  var v=document.getElementById('instaInput').value.trim();
  if(!v)return;
  updateInsta(v).then(function(){
    document.getElementById('topInstaBox').innerHTML='<p class="sub" style="color:#7effa0">✓ ENREGISTRÉ · À BIENTÔT LE 8 AOÛT</p>';
  });
});
document.getElementById('btnShare').addEventListener('click',function(){
  var txt = (phase==='done')
    ? 'J\'ai bouclé le tour de la Corvette en '+fmt(elapsed)+' sur TURBO DISCO · FDP 2026 !'
    : 'Je me suis fait éliminer sur TURBO DISCO · FDP 2026. Fais mieux.';
  if(navigator.share){navigator.share({title:'Turbo Disco',text:txt,url:location.href}).catch(function(){});}
  else if(navigator.clipboard){
    navigator.clipboard.writeText(txt+' '+location.href);
    var b=this,o=b.textContent;b.textContent='✓ COPIÉ';setTimeout(function(){b.textContent=o;},1400);
  }
});
function renderLb(){
  var box=document.getElementById('lbContent');
  box.innerHTML='<p class="loader">CHARGEMENT...</p>';
  loadScores().then(function(s){
    if(!s||!s.length){box.innerHTML='<p class="sub">AUCUN SCORE. SOIS LE PREMIER.</p>';return;}
    var rows='<table class="lb-table"><tr><th>#</th><th>PILOTE</th><th>TEMPS</th></tr>';
    for(var i=0;i<s.length;i++){
      var cls = i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':'';
      var me = (s[i].name===playerName)?' class="me"':'';
      rows+='<tr'+me+'><td class="'+cls+'">'+(i+1)+'</td><td>'+s[i].name+'</td><td>'+fmt(s[i].time_ms)+'</td></tr>';
    }
    box.innerHTML=rows+'</table>';
  });
}

// ══════ BOUCLE ══════
function loop(t){
  if(phase==='running'){
    elapsed=performance.now()-t0;
    hudTimer.textContent=fmt(elapsed);
  }
  if(phase==='menu'||phase==='ready')discoAng=t*0.0018;

  ctx.clearRect(0,0,W,H);
  drawFloor();
  drawDiscoBeams(t);
  drawTrail();
  drawCrowd(t);
  drawCar();
  drawDiscoBall(t);
  if(phase==='ready'||phase==='running')drawGhostRecord();
  if(phase==='done')drawConfetti();
  drawOverlayFX(t);
  requestAnimationFrame(loop);
}

if(muted){var _bm=document.getElementById('btnMute');_bm.textContent='♪̸';_bm.style.color='#4a2470';}
loadCount();
loadTopScore();
resetRun();
phase='menu';
requestAnimationFrame(loop);
</script>
</body>
</html>
