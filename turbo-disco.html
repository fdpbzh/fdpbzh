<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Turbo Disco — FDP 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0d0014;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;overflow:hidden;touch-action:none;}
#wrap{position:relative;width:min(100vw,calc(100vh*9/16));height:min(100vh,calc(100vw*16/9));max-width:400px;max-height:710px;}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated;border:2px solid #6b21a8;box-shadow:0 0 30px #c026d355;touch-action:none;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,0,20,0.93);gap:10px;padding:18px;z-index:20;overflow-y:auto;}
@media(max-height:300px){.screen{justify-content:flex-start;padding:10px;gap:6px}}
.screen.hidden{display:none;}
.hidden{display:none !important;}
h1{font-size:clamp(13px,3.5vw,20px);color:#f0abfc;text-align:center;text-shadow:3px 3px #6b21a8,0 0 18px #c026d3;line-height:1.7;}
.sub{font-size:clamp(5px,1.5vw,8px);color:#d8b4fe;text-align:center;line-height:2.2;}
.big{font-size:clamp(9px,2.5vw,14px);color:#ffd700;text-shadow:0 0 10px #ffd700;text-align:center;}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,10px);padding:10px 18px;background:#6b21a8;color:#fff;border:2px solid #f0abfc;cursor:pointer;animation:blink 1s step-end infinite;}
.btn:active{background:#c026d3;animation:none;}
.btn-sm{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.4vw,8px);padding:6px 12px;background:#1e0030;color:#f0abfc;border:1px solid #6b21a8;cursor:pointer;}
.btn-sm:active{background:#6b21a8;}
input[type=text]{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.8vw,10px);padding:8px;background:#1e0030;color:#f0abfc;border:2px solid #6b21a8;outline:none;width:min(180px,60%);text-align:center;}
input[type=text]::placeholder{color:#7c3f9e;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.lb-table{width:100%;border-collapse:collapse;font-size:clamp(5px,1.3vw,7px);color:#f0abfc;}
.lb-table th{color:#ffd700;padding:3px 5px;border-bottom:1px solid #6b21a8;}
.lb-table td{padding:4px 5px;border-bottom:1px solid #2a004a;}
.lb-table tr.me td{color:#fff;background:#2a004a;}
.rank-gold{color:#ffd700}.rank-silver{color:#c0c0c0}.rank-bronze{color:#cd7f32}
.loader{font-size:6px;color:#7c3f9e;animation:blink .6s step-end infinite;}
#hudTimer{position:absolute;top:8px;left:10px;z-index:10;font-size:clamp(9px,2.4vw,15px);color:#fff;text-shadow:2px 2px #6b21a8;pointer-events:none;}
#hudTimer.run{color:#ffd700;text-shadow:2px 2px #6b21a8,0 0 10px #ffd700;}
#hudLap{position:absolute;top:8px;right:10px;z-index:10;font-size:clamp(5px,1.4vw,8px);color:#d8b4fe;pointer-events:none;text-align:right;}
#hudBar{position:absolute;top:26px;right:10px;z-index:10;width:clamp(60px,18vw,110px);height:5px;background:#1e0030;border:1px solid #6b21a8;pointer-events:none;}
#hudBarFill{height:100%;width:0%;background:#c026d3;box-shadow:0 0 5px #c026d3;}
#hudMsg{position:absolute;bottom:8px;left:0;right:0;z-index:10;text-align:center;font-size:clamp(5px,1.4vw,8px);color:#d8b4fe;pointer-events:none;line-height:2;}
#hudMsg.go{color:#ffd700}
#hudMsg.bad{color:#ff4d6d}
#btnMute{position:absolute;bottom:6px;right:8px;z-index:15;font-family:'Press Start 2P',monospace;font-size:8px;background:transparent;border:none;color:#7c3f9e;cursor:pointer;padding:4px;}
#btnMute:active{color:#f0abfc;}
#btnMenu{position:absolute;bottom:6px;left:8px;z-index:15;font-family:'Press Start 2P',monospace;font-size:7px;background:transparent;border:none;color:#7c3f9e;cursor:pointer;padding:4px;}
#btnMenu:active{color:#f0abfc;}
/* ── Accueil « drapeau à damier » ── */
.damier{position:absolute;left:0;right:0;height:26px;background:repeating-conic-gradient(#f0f0f0 0% 25%,#0a0a0a 0% 50%) 0 0/26px 26px;}
#logoCanvas{width:min(56vw,210px);height:auto;image-rendering:pixelated;filter:drop-shadow(0 0 10px #c026d366);}
#sMenu .sub{letter-spacing:1px;}
/* Rampe de départ F1 : 5 feux rouges qui s'allument un à un, puis extinction = GO */
#startLight{display:flex;gap:9px;background:#1e0030;border:1px solid #6b21a8;padding:7px 12px;margin:4px 0;}
#startLight span{width:11px;height:11px;border-radius:50%;background:#ff4d6d;box-shadow:0 0 7px #ff4d6d;opacity:.13;}
#startLight span:nth-child(1){animation:feu1 4s step-end infinite;}
#startLight span:nth-child(2){animation:feu2 4s step-end infinite;}
#startLight span:nth-child(3){animation:feu3 4s step-end infinite;}
#startLight span:nth-child(4){animation:feu4 4s step-end infinite;}
#startLight span:nth-child(5){animation:feu5 4s step-end infinite;}
@keyframes feu1{0%,9%{opacity:.13}10%,69%{opacity:1}70%,100%{opacity:.13}}
@keyframes feu2{0%,17%{opacity:.13}18%,69%{opacity:1}70%,100%{opacity:.13}}
@keyframes feu3{0%,25%{opacity:.13}26%,69%{opacity:1}70%,100%{opacity:.13}}
@keyframes feu4{0%,33%{opacity:.13}34%,69%{opacity:1}70%,100%{opacity:.13}}
@keyframes feu5{0%,41%{opacity:.13}42%,69%{opacity:1}70%,100%{opacity:.13}}
#btnPlay{background:#1e0030;border-color:#ffd700;color:#ffd700;}
#btnPlay:active{background:#ffd700;color:#0d0014;}
input.need{border-color:#ff4d6d !important;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
#verTag{position:absolute;bottom:4px;right:6px;font-size:5px;color:#3a0a5c;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="400" height="710"></canvas>

  <div id="hudTimer">00.0000</div>
  <div id="hudLap">TOUR 0%</div>
  <div id="hudBar"><div id="hudBarFill"></div></div>
  <div id="hudMsg">POSE TON DOIGT SUR LA BOULE DISCO</div>
  <button id="btnMute">♪</button>
  <button id="btnMenu">≡ MENU</button>

  <div class="screen" id="sMenu">
    <div class="damier" style="top:11%;"></div>
    <div class="damier" style="bottom:11%;"></div>
    <canvas id="logoCanvas" width="352" height="112" role="img" aria-label="Turbo Disco"></canvas>
    <p class="sub">CHAMPIONNATS DU MONDE INUTILES<br>ÉPREUVE OFFICIELLE</p>
    <div id="startLight"><span></span><span></span><span></span><span></span><span></span></div>
    <input type="text" id="nameInput" maxlength="12" placeholder="TON PSEUDO" autocomplete="off" spellcheck="false">
    <button class="btn" id="btnPlay">▶ DEMARRER</button>
    <button class="btn-sm" id="btnLbMenu">★ SCORES</button>
    <p id="gameCount" style="font-size:clamp(4px,1.2vw,6px);color:#c026d3;letter-spacing:1px;">&nbsp;</p>
    <span id="verTag">V14</span>
  </div>

  <div class="screen hidden" id="sResult">
    <h1>★ RÉSULTAT ★</h1>
    <p class="sub" id="resName"></p>
    <p class="big" id="resTime"></p>
    <p class="sub" id="resComment"></p>
    <div id="topInstaBox" class="hidden" style="border-top:1px solid #ffd700;border-bottom:1px solid #ffd700;padding:8px 0;width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;">
      <p class="sub" style="color:#ffd700;font-size:clamp(6px,1.6vw,9px);letter-spacing:1px;">★ TU ES DANS LE TOP 10 ★</p>
      <input type="text" id="instaInput" maxlength="30" placeholder="@TON_INSTA" autocomplete="off" spellcheck="false">
      <button class="btn-sm" id="btnConfirmInsta">CONFIRMER</button>
    </div>
    <button class="btn" id="btnReplay">▶ REJOUER</button>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
      <button class="btn-sm" id="btnShare">→ PARTAGER</button>
      <button class="btn-sm" id="btnLbRes">★ SCORES</button>
    </div>
  </div>

  <div class="screen hidden" id="sLb">
    <p style="font-size:clamp(8px,2vw,13px);color:#ffd700">★ HALL OF FAME ★</p>
    <p class="sub">Tour le plus rapide</p>
    <p class="sub" style="color:#ffd700;">TOP 10 = BOISSON · 1ER = OPEN BAR<br>À RÉCUPÉRER SUR PLACE LE 8 AOÛT</p>
    <div id="lbContent"><p class="loader">CHARGEMENT...</p></div>
    <button class="btn-sm" id="btnBack">← RETOUR</button>
  </div>
</div>

<script>
// ══════ SUPABASE ══════
var SB_URL='https://nhsroymqvwrjflagzznz.supabase.co/rest/v1';  // projet fdp-scores (commun a tous les jeux FDP)
var SB_KEY='sb_publishable_UH528FgC5FVbxNFYi9Odlg_jcPZuK4J';
var TABLE='turbo_scores';

var MIN_TIME_MS=600, MAX_TIME_MS=180000, MIN_PLAY_MS=1500, MIN_ACTIONS=25;

function sbHeaders(extra){
  var h={apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY};
  if(extra)for(var k in extra)h[k]=extra[k];
  return h;
}

var sessionToken=null, sessionStartTime=0, actionCount=0;
function newSession(){
  sessionToken='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);
  });
  sessionStartTime=Date.now(); actionCount=0;
}
function trackAction(){actionCount++;}

var lastScoreId=null;
function loadScores(){
  return fetch(SB_URL+'/'+TABLE+'?select=name,time_ms&order=time_ms.asc&limit=10',{headers:sbHeaders()})
    .then(function(r){return r.json();}).catch(function(){return[];});
}
var topScore=null;
function loadTopScore(){
  return fetch(SB_URL+'/'+TABLE+'?select=name,time_ms&order=time_ms.asc&limit=1',{headers:sbHeaders()})
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.length)topScore=d[0];}).catch(function(){});
}
function saveScore(name,ms){
  if(!sessionToken)return Promise.resolve(null);
  var playTime=Date.now()-sessionStartTime;
  if(playTime<MIN_PLAY_MS)return Promise.resolve(null);
  if(ms<MIN_TIME_MS||ms>MAX_TIME_MS)return Promise.resolve(null);
  if(actionCount<MIN_ACTIONS)return Promise.resolve(null);
  var body={name:name.toUpperCase().slice(0,12),time_ms:Math.round(ms*10)/10,insta:null,
            session_id:sessionToken,play_time_ms:playTime,action_count:actionCount};
  return fetch(SB_URL+'/'+TABLE,{method:'POST',
    headers:sbHeaders({'Content-Type':'application/json','Prefer':'return=representation'}),
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    sessionToken=null;
    if(d&&d[0]&&d[0].id)lastScoreId=d[0].id;
    loadCount(); loadTopScore();
    return d&&d[0]?d[0]:null;
  }).catch(function(){return null;});
}
function updateInsta(insta){
  if(!lastScoreId)return Promise.resolve();
  if(insta.charAt(0)==='@')insta=insta.substring(1);
  insta=insta.trim().slice(0,30);
  if(!insta)return Promise.resolve();
  return fetch(SB_URL+'/'+TABLE+'?id=eq.'+lastScoreId,{method:'PATCH',
    headers:sbHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}),
    body:JSON.stringify({insta:insta})
  }).then(function(){lastScoreId=null;}).catch(function(){});
}
function checkTop10AndRevealInsta(ms){
  loadScores().then(function(s){
    if(!s||s.length===0)return;
    var q = s.length<10 ? true : ms<=s[s.length-1].time_ms;
    if(q){var b=document.getElementById('topInstaBox');if(b)b.classList.remove('hidden');}
  });
}
function isTop10(ms){
  return loadScores().then(function(s){
    if(!s||s.length<10)return true;
    return ms<=s[s.length-1].time_ms;
  }).catch(function(){return true;});   // réseau KO → on montre la cérémonie
}
var totalGames=0;
function loadCount(){
  return fetch(SB_URL+'/'+TABLE+'?select=*',{method:'HEAD',
    headers:sbHeaders({'Prefer':'count=exact','Range':'0-0'})
  }).then(function(r){
    var range=r.headers.get('content-range');
    if(range){var m=range.match(/\/(\d+)/);if(m)totalGames=parseInt(m[1]);}
    var el=document.getElementById('gameCount');
    if(el)el.textContent=totalGames+' TOURS BOUCLÉS';
  }).catch(function(){});
}

// ══════ AUDIO ══════
var ac=null,masterGain=null,bgmPlaying=false,bgmTimer=null,muted=false;
try{muted=localStorage.getItem('td_mute')==='1';}catch(e){}
// BGM = V8 au ralenti + kick disco 124 BPM (son n°5 retenu le 10/07).
// Le moteur est un ensemble de nœuds continus (engineNodes), le kick passe
// par le scheduler look-ahead classique (kickT).
var BEAT=60/124, kickT=0, engineNodes=[];
function getAC(){if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();masterGain=ac.createGain();masterGain.gain.value=0.42;masterGain.connect(ac.destination);}return ac;}
function oscNote(f,st,dur,ty,vol){
  if(!f)return;
  var o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(masterGain);
  o.type=ty||'square';o.frequency.value=f;
  g.gain.setValueAtTime(0,st);
  g.gain.linearRampToValueAtTime(vol||0.18,st+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,st+dur-0.02);
  o.start(st);o.stop(st+dur);
}
function noiseHit(st,dur,freq,vol){
  var buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  var src=ac.createBufferSource();src.buffer=buf;
  var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=freq||200;f.Q.value=0.5;
  var g=ac.createGain();src.connect(f);f.connect(g);g.connect(masterGain);
  g.gain.setValueAtTime(vol||0.3,st);g.gain.exponentialRampToValueAtTime(0.001,st+dur);
  src.start(st);src.stop(st+dur);
}
function brownBuffer(sec){   // bruit brun (grave) pour l'échappement
  var b=ac.createBuffer(1,Math.ceil(ac.sampleRate*sec),ac.sampleRate);
  var d=b.getChannelData(0),last=0;
  for(var i=0;i<d.length;i++){var w=Math.random()*2-1;last=(last+0.02*w)/1.02;d[i]=last*3.5;}
  return b;
}
function kick(at){
  var k=ac.createOscillator(),g=ac.createGain();
  k.type='sine';
  k.frequency.setValueAtTime(120,at);
  k.frequency.exponentialRampToValueAtTime(45,at+0.10);
  g.gain.setValueAtTime(0.5,at);
  g.gain.exponentialRampToValueAtTime(0.01,at+0.16);
  k.connect(g);g.connect(masterGain);
  k.start(at);k.stop(at+0.18);
}
function scheduleBGM(){
  if(!bgmPlaying)return;
  var now=ac.currentTime,LA=0.25;
  while(kickT<now+LA){kick(kickT);kickT+=BEAT;}
  bgmTimer=setTimeout(scheduleBGM,60);
}
// ── V8 au ralenti : sub + saw filtré + souffle d'échappement + « lope » (double LFO) ──
function startEngine(){
  var FIRE=42,SUB=28,BRIGHT=220,LOPE=0.6,RATE=1.1;
  var sub=ac.createOscillator(),sg=ac.createGain();
  sub.type='sine';sub.frequency.value=SUB;sg.gain.value=0.30;
  sub.connect(sg);sg.connect(masterGain);sub.start();
  var body=ac.createOscillator(),bg=ac.createGain(),bf=ac.createBiquadFilter();
  body.type='sawtooth';body.frequency.value=FIRE;
  bf.type='lowpass';bf.frequency.value=BRIGHT;bf.Q.value=1.5;
  bg.gain.value=0.34;
  body.connect(bf);bf.connect(bg);bg.connect(masterGain);body.start();
  var nz=ac.createBufferSource();nz.buffer=brownBuffer(2);nz.loop=true;
  var nf=ac.createBiquadFilter();nf.type='lowpass';nf.frequency.value=BRIGHT*1.6;
  var ng=ac.createGain();ng.gain.value=0.16;
  var trem=ac.createOscillator(),tg=ac.createGain();
  trem.type='sine';trem.frequency.value=FIRE/2;tg.gain.value=0.10;
  trem.connect(tg);tg.connect(ng.gain);
  nz.connect(nf);nf.connect(ng);ng.connect(masterGain);nz.start();trem.start();
  var l1=ac.createOscillator(),l1g=ac.createGain();
  l1.type='sine';l1.frequency.value=RATE;l1g.gain.value=FIRE*0.09*LOPE;
  l1.connect(l1g);l1g.connect(body.frequency);l1.start();
  var l2=ac.createOscillator(),l2g=ac.createGain();
  l2.type='sine';l2.frequency.value=RATE*0.73;l2g.gain.value=0.12*LOPE;
  l2.connect(l2g);l2g.connect(bg.gain);l2.start();
  var l3g=ac.createGain();l3g.gain.value=SUB*0.06*LOPE;
  l1.connect(l3g);l3g.connect(sub.frequency);
  engineNodes=[sub,sg,body,bg,bf,nz,nf,ng,trem,tg,l1,l1g,l2,l2g,l3g];
}
function stopEngine(){
  engineNodes.forEach(function(nd){
    try{if(nd.stop)nd.stop();}catch(e){}
    try{nd.disconnect();}catch(e){}
  });
  engineNodes=[];
}
function startBGM(){
  if(muted)return;
  getAC();if(ac.state==='suspended')ac.resume();
  if(bgmPlaying)return;bgmPlaying=true;
  startEngine();
  kickT=ac.currentTime+0.05;
  scheduleBGM();
}
function stopBGM(){bgmPlaying=false;clearTimeout(bgmTimer);stopEngine();}
function sfxStart(){if(muted)return;getAC();[523,659,784].forEach(function(f,i){oscNote(f,ac.currentTime+i*.05,.08,'square',.16);});}
function sfxCrash(){if(muted)return;getAC();noiseHit(ac.currentTime,.25,300,0.30);oscNote(120,ac.currentTime,.22,'sawtooth',.16);oscNote(70,ac.currentTime+.1,.25,'square',.10);}
function sfxWin(){if(muted)return;getAC();[523,659,784,1047,1319].forEach(function(f,i){oscNote(f,ac.currentTime+i*.07,.10,'square',.17);});}
function sfxTick(){if(muted||!ac)return;oscNote(1200,ac.currentTime,.02,'square',.03);}

document.getElementById('btnMute').addEventListener('click',function(e){
  e.stopPropagation();
  muted=!muted;
  try{localStorage.setItem('td_mute',muted?'1':'0');}catch(e){}
  this.textContent=muted?'♪̸':'♪';
  this.style.color=muted?'#4a2470':'#7c3f9e';
  if(muted)stopBGM(); else if(phase!=='menu')startBGM();
});
// Retour menu (changement de pseudo) — seulement à l'attente du départ
document.getElementById('btnMenu').addEventListener('click',function(e){
  e.stopPropagation();
  if(phase!=='ready')return;
  show('sMenu'); phase='menu';
});

// ══════ CANVAS ══════
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
var W=400,H=710,CX=W/2,CY=H/2;

// ══════ PISTE ELLIPTIQUE (PORTRAIT) ══════
// Limite EXTÉRIEURE : f > F_OUT = mort (crabes), avec f = sqrt((dx/RX)^2+(dy/RY)^2).
// Limite INTÉRIEURE : hitbox pixel-perfect de la voiture (voir inCar), plus l'ellipse.
// F_IN ne sert plus qu'aux visuels/références. La foule se génère au-delà de F_OUT+0.02.
var RX=90, RY=160;
var F_IN=0.72, F_OUT=1.26;

// ══════ CORVETTE LOWRIDER L3 — 80×40 px dessinés à 2px ══════
// Rouge, flammes violettes FDP, jantes fil chromées, néons roses sous caisse.
// Encodage : CAR_ROWS = 40 chaînes de 80 caractères ('.'=vide, sinon index CAR_PAL)
var CAR_PAL=['#0c0c14','#dce1eb','#f0abfc','#ffd700','#6e0d0d','#961ebe','#a01313','#c81818','#f078e6','#ffdcfa','#14101e','#ff3c3c','#aa1414','#ffeeaa','#ff2222','#e6e6f0'];
var CAR_ROWS=[
'........00000000000.......................................00000000000...........',
'........00111121120.2..2..2..2..2..2..2..2..2..2..2..2..2.02112112100...........',
'........00113331100.......................................00113331100...........',
'........0011111110044444444444444444444444444444444444444.00111111100...........',
'........0000000000044444444444444444444444444444444444454400000000000...........',
'........444444666666666666666666666666666666666666666556655644444444............',
'.......444466666666666677777777777777777777777777775577666688688864444..........',
'......44666667777777777777777777777777777777777777777777777778776666444444......',
'....44466777777777777777777777777777777777777777777777777775578877768999994.....',
'...4466777777777777777777777777777777777777777777777775775577777887789996694....',
'..46667777777777777777777777777777777777aaaaaaaaa7777775577777777788887777694...',
'.4bb777777777777aaaaaaaaaaccccccccccccccaaaaaaaaa7777777757777778877889979999d..',

var SPR_W=42, SPR_H=38, SPR_OX=19, SPR_OY=24;
var SPRITES=[[],[]];
(function buildCrabSprites(){
  for(var dir=0;dir<2;dir++){

function drawCrabInto(g,cx,cy,s,k,look){
  function q(x,y,w,h,col){g.fillStyle=col;g.fillRect(Math.round(cx+x),Math.round(cy+y),Math.max(1,Math.round(w)),Math.max(1,Math.round(h)));}
  var ph=k*Math.PI*2;
  var twitch=Math.sin(ph)*1.4;
  var open=(0.5+0.5*Math.sin(ph))*s*0.7;
  var legJ=Math.sin(ph*2)*1.1;
  // pattes
  q(-s*4.5,-s*1+legJ*.6,s,s*1.5,'#902010');
  q(-s*4,  s*0.3+legJ,   s,s*1.5,'#902010');
  q(-s*4.5,s*1.5-legJ*.4,s,s*1.2,'#902010');
  q(s*3.5,-s*1-legJ*.6,  s,s*1.5,'#902010');
  q(s*3,   s*0.3-legJ,   s,s*1.5,'#902010');
  q(s*3.5, s*1.5+legJ*.4,s,s*1.2,'#902010');
  // pinces
  q(-s*3.5,-s*2.5,s*0.8,s,'#a02808');
  q(-s*4,  -s*3.5,s*1.5,s,'#a02808');
  q(-s*4.2,-s*4.3-open+twitch,s*1.8,s*0.8,'#c82810');
  q(-s*4.2,-s*3+open*.4-twitch,s*1.8,s*0.4,'#c82810');
  q(s*2.7,-s*2.5,s*0.8,s,'#a02808');
  q(s*2.5,-s*3.5,s*1.5,s,'#a02808');
  q(s*2.4,-s*4.3-open-twitch,s*1.8,s*0.8,'#c82810');
  q(s*2.4,-s*3+open*.4+twitch,s*1.8,s*0.4,'#c82810');
  // carapace
  q(-s*2.5, s*1,  s*5,  s,    '#902010');
  q(-s*3,  -s*0.5,s*6,  s*1.7,'#b02010');
  q(-s*2.5,-s*1.5,s*5,  s*1.2,'#c82010');
  q(-s*2,  -s*2,  s*4,  s*0.7,'#e03020');
  q(-s,    -s*2,  s*2,  s*0.5,'#ff5530');
  // tiges oculaires
  q(-s*1.3,-s*2.8,s*0.5,s*0.8,'#902010');
  q( s*0.8,-s*2.8,s*0.5,s*0.8,'#902010');
  // yeux + pupilles orientées
  q(-s*1.6,-s*3.5,s,s,'#0a0a0a');
  q( s*0.6,-s*3.5,s,s,'#0a0a0a');
  var lx=look*s*0.35;
  q(-s*1.4+lx,-s*3.3,s*0.4,s*0.4,'#fff');
  q( s*0.8+lx,-s*3.3,s*0.4,s*0.4,'#fff');
}

// ══════ FOULE : ~380 crabes, densité uniforme ══════
// Pas d'anneau rangé : échantillonnage uniforme sur tout le canvas avec
// espacement minimal, en rejetant tout crabe dont le corps mordrait sur le
// couloir. L'ovale n'est pas dessiné : il émerge comme la clairière que la
// foule ne peut pas envahir, avec un bord naturellement irrégulier.
// (validé par simulation : bord de clairière f∈[1.27,1.46] sur 24 secteurs, 0 trou)
var CRABS=[];
(function buildCrowd(){
  var tries=0;
  while(CRABS.length<380 && tries<25000){
    tries++;
    var x=-24+Math.random()*(W+48);
    var y=-24+Math.random()*(H+48);
    var sc=0.84+Math.random()*0.56;
    // point du corps le plus proche du centre
    var dx=x-CX, dy=y-CY;
    var L=Math.hypot(dx,dy)||1;
    var m=22*sc;
    var bx=x-dx/L*m, by=y-dy/L*m;
    var f=Math.hypot((bx-CX)/RX,(by-CY)/RY);
    if(f<F_OUT+0.02) continue;           // mordrait sur le couloir
    var ok=true;                          // espacement minimal
    for(var i=0;i<CRABS.length;i++){
      var o=CRABS[i];
      if((x-o.x)*(x-o.x)+(y-o.y)*(y-o.y)<361){ok=false;break;}
    }
    if(!ok) continue;
    CRABS.push({x:x,y:y,sc:sc,
                ph:Math.random(),sp:0.55+Math.random()*1.1,
                dir:(x<CX)?1:0});
  }
  CRABS.sort(function(a,b){return a.y-b.y;});
})();

function drawDiscoBall(t){
  var r=SBR, fr, fq;
  var pulse=.5+.5*Math.sin(t*0.005);
  var g=ctx.createRadialGradient(SBX,SBY,0,SBX,SBY,r*3.4);
  g.addColorStop(0,'rgba(255,255,255,'+(0.30*pulse)+')');
  g.addColorStop(.5,'rgba(185,190,205,'+(0.14*pulse)+')');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(SBX,SBY,r*3.4,0,Math.PI*2);ctx.fill();

  // Facettes gris/blanc — boule à facettes réaliste, seule la lumière ambiante colore la scène
  var fc=['#ffffff','#e8eaf0','#c9ccd8','#9aa0b0','#f4f5f8','#b4bac8'];
  var F=7, spin=discoAng;
  for(fr=0;fr<F;fr++){
    for(fq=0;fq<F;fq++){
      var a0=(fq/F)*Math.PI*2+spin;
      if(Math.cos(a0)<-0.15)continue;
      var e0=(fr/F)-.5, e1=((fr+.85)/F)-.5;
      var rr=r*Math.cos(e0*Math.PI);
      var y0=SBY+r*Math.sin(e0*Math.PI), y1=SBY+r*Math.sin(e1*Math.PI);
      ctx.globalAlpha=.35+.65*Math.max(0,Math.cos(a0+0.4));
      px(SBX+Math.cos(a0)*rr-2,y0,4,Math.max(2,y1-y0),fc[(fr+fq+((spin*2)|0))%fc.length]);
    }
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='#e8eaf0';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(SBX,SBY,r,0,Math.PI*2);ctx.stroke();
  for(var i=0;i<8;i++){
    var ra=(i/8)*Math.PI*2+spin*1.4;
    var ri=r+3+Math.sin(t*0.007+i)*2;
    var ro=ri+4+Math.sin(t*0.009+i*1.3)*3;
    ctx.strokeStyle=fc[i%fc.length];
    ctx.globalAlpha=.4+.5*Math.sin(t*0.008+i);
    ctx.beginPath();
    ctx.moveTo(SBX+Math.cos(ra)*ri,SBY+Math.sin(ra)*ri);
    ctx.lineTo(SBX+Math.cos(ra)*ro,SBY+Math.sin(ra)*ro);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  if(phase==='ready'&&((t/450)|0)%2===0){
    ctx.fillStyle='#ffd700';ctx.font='7px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText('START',SBX,SBY-r-8);
    ctx.textAlign='left';
  }
}

// ══════ GÉOMÉTRIE / COLLISION ══════
function ellipseF(x,y){
  var dx=(x-CX)/RX, dy=(y-CY)/RY;
  return Math.sqrt(dx*dx+dy*dy);
}
// Hitbox voiture PIXEL-PERFECT : on ne meurt que si le point touche un vrai
// pixel de la grille CAR_ROWS (l'ellipse intérieure F_IN ne sert plus à la mort).
// Mapping inverse de la rotation 90° du pré-rendu : x écran ↔ ligne, y écran ↔ colonne.
// Conséquence assumée : le couloir gagne ~25px sur les flancs et ~35px aux
// extrémités ; l'anti-visseuse ne tient plus que sur les coins de la voiture.
function inCar(x,y){
  var gx=x-(CX-CPW/2), gy=y-(CY-CPH/2);
  if(gx<0||gy<0||gx>=CPW||gy>=CPH)return false;
  var r=CR-1-((gx/GP)|0), c=(gy/GP)|0;
  return CAR_ROWS[r].charAt(c)!=='.';
}
function nearBall(x,y){return Math.hypot(x-SBX,y-SBY)<SBR*1.8;}
function angOf(x,y){return Math.atan2(y-CY,x-CX);}
function angDiff(a,b){var d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d;}

// ══════ INPUT ══════
// Suivi par identifiant de doigt : seul le doigt qui a démarré sur la boule
// disco pilote le jeu. Un 2e contact (paume, pouce qui tient le téléphone)
// est totalement ignoré, et son retrait ne termine pas la partie.
var activeTouchId=null;   // identifier du doigt de jeu (null = souris ou aucun)
var mouseActive=false;

function toCanvas(clientX,clientY){
  var r=canvas.getBoundingClientRect();
  return {x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height)};
}
function findTouch(list,id){
  for(var i=0;i<list.length;i++) if(list[i].identifier===id) return list[i];
  return null;
}

function crossT(x0,y0,x1,y1,R){
  // s ∈ [0,1] où le segment (x0,y0)→(x1,y1) coupe le cercle de rayon R centré boule
  var dx=x1-x0,dy=y1-y0,fx=x0-SBX,fy=y0-SBY;
  var a=dx*dx+dy*dy;
  if(a===0)return 0;
  var b=2*(fx*dx+fy*dy),c=fx*fx+fy*fy-R*R;
  var disc=b*b-4*a*c;
  if(disc<0)return 0.5;
  var sq=Math.sqrt(disc);
  var r1=(-b-sq)/(2*a),r2=(-b+sq)/(2*a);
  if(r1>=0&&r1<=1)return r1;
  if(r2>=0&&r2<=1)return r2;
  return 0.5;
}

function beginRun(p,tNow){
  phase='running'; t0=0; lastMoveT=tNow;   // chrono armé, il part à la sortie de la boule
  startAng=angOf(p.x,p.y); lastAng=startAng;
  trail=[{x:p.x,y:p.y}]; acc=0;
  hudTimer.className='run';
  hudMsg.className='go'; hudMsg.textContent='LE CHRONO PART QUAND TU QUITTES LA BOULE !';
  sfxStart();
}

function stepRun(p,tNow){
  trackAction();
  var prev=trail[trail.length-1];
  var tPrev=lastMoveT; lastMoveT=tNow;
  trail.push(p); if(trail.length>600)trail.shift();
  discoAng=angOf(p.x,p.y);

  // Interpolation du segment (anti-tunneling) : collisions, angle ET portes de
  // chrono évalués tous les ~6px entre deux événements. L'instant de
  // franchissement de la porte est résolu au sous-pixel (crossT) puis converti
  // en temps par interpolation linéaire entre les timestamps des deux événements.
  var steps=Math.max(1,Math.ceil(Math.hypot(p.x-prev.x,p.y-prev.y)/6));
  for(var i=1;i<=steps;i++){
    var u0=(i-1)/steps, u1=i/steps;
    var jx=prev.x+(p.x-prev.x)*u0, jy=prev.y+(p.y-prev.y)*u0;
    var ix=prev.x+(p.x-prev.x)*u1, iy=prev.y+(p.y-prev.y)*u1;
    if(Math.hypot(ix-SBX,iy-SBY)>SBR*2.4){
      if(inCar(ix,iy)){die('TU AS TOUCHÉ LA CORVETTE !');return;}
      if(ellipseF(ix,iy)>F_OUT){die('TU AS BOUSCULÉ LES CRABES !');return;}
    }
    var ia=Math.atan2(iy-CY,ix-CX);
    acc+=angDiff(ia,lastAng); lastAng=ia;
    var d0=Math.hypot(jx-SBX,jy-SBY), d1=Math.hypot(ix-SBX,iy-SBY);
    if(t0===0 && d0<=GATE && d1>GATE){
      // départ : sortie de la porte
      var s=crossT(jx,jy,ix,iy,GATE);
      t0=tPrev+(tNow-tPrev)*(u0+(u1-u0)*s);
      hudMsg.className='go'; hudMsg.textContent='TOURNE ENTRE LA VOITURE ET LES CRABES !';
    } else if(t0>0 && !lapDone && Math.abs(acc)>=Math.PI*1.9 && d1<=GATE && d0>GATE){
      // arrivée : contact retour avec la boule après un tour complet
      var s2=crossT(jx,jy,ix,iy,GATE);
      lapDone=true;
      finish(tPrev+(tNow-tPrev)*(u0+(u1-u0)*s2));
      return;
    }
  }

  var prog=Math.min(Math.abs(acc)/(Math.PI*2),1);
  var pc=Math.round(prog*100);
  hudBarFill.style.width=pc+'%';
  hudLap.textContent='TOUR '+pc+'%';
  if(pc%25===0 && pc!==lastTickPc && pc>0){lastTickPc=pc;sfxTick();}
}

// ── tactile ──
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(phase!=='ready')return;
  // cherche parmi les NOUVEAUX contacts celui qui est sur la boule
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    var p=toCanvas(t.clientX,t.clientY);
    if(nearBall(p.x,p.y)){
      activeTouchId=t.identifier;
      beginRun(p,e.timeStamp||performance.now());
      return;
    }
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(phase!=='running'||activeTouchId===null)return;
  var t=findTouch(e.touches,activeTouchId);
  if(!t)return;                      // le doigt de jeu n'a pas bougé, ignorer
  stepRun(toCanvas(t.clientX,t.clientY),e.timeStamp||performance.now());
},{passive:false});

function touchEnd(e){
  if(phase!=='running'||activeTouchId===null)return;
  // ne mourir que si c'est LE doigt de jeu qui se lève
  if(findTouch(e.changedTouches,activeTouchId)){
    e.preventDefault();
    activeTouchId=null;
    die('DOIGT LEVÉ TROP TÔT !');
  }
}
canvas.addEventListener('touchend',touchEnd,{passive:false});
canvas.addEventListener('touchcancel',touchEnd,{passive:false});

// ── souris (desktop) ──
canvas.addEventListener('mousedown',function(e){
  e.preventDefault();
  if(phase!=='ready')return;
  var p=toCanvas(e.clientX,e.clientY);
  if(!nearBall(p.x,p.y))return;
  mouseActive=true;
  beginRun(p,e.timeStamp||performance.now());
});
canvas.addEventListener('mousemove',function(e){
  if(phase!=='running'||!mouseActive)return;
  e.preventDefault();
  // bouton relâché hors fenêtre : le mouseup de window n'a pas été vu
  if(e.buttons===0){mouseActive=false;die('DOIGT LEVÉ TROP TÔT !');return;}
  stepRun(toCanvas(e.clientX,e.clientY),e.timeStamp||performance.now());
});
window.addEventListener('mouseup',function(e){
  if(phase!=='running'||!mouseActive)return;
  mouseActive=false;
  die('DOIGT LEVÉ TROP TÔT !');
});

// ══════ FIN DE PARTIE ══════
function die(reason){
  phase='dead'; deathReason=reason; flashT=20;
  activeTouchId=null; mouseActive=false;
  hudTimer.className='';
  hudMsg.className='bad'; hudMsg.textContent=reason+' · ENCORE !';
  sfxCrash();
  // Pas d'écran résultat : on redonne la main immédiatement (volume de parties)
  setTimeout(function(){if(phase==='dead'){newSession();resetRun();}},1200);
}
function finish(tHit){
  phase='done';
  activeTouchId=null; mouseActive=false;
  elapsed=tHit-t0;   // temps de porte à porte, interpolé au franchissement
  hudTimer.className=''; hudTimer.textContent=fmt(elapsed);
  hudBarFill.style.width='100%'; hudBarFill.style.background='#ffd700';
  hudLap.textContent='TOUR 100%';
  hudMsg.className='go'; hudMsg.textContent='BOUCLÉ EN '+fmt(elapsed)+' !';
  sfxWin(); spawnConfetti();
  // Chaque tour bouclé est enregistré (compteur + stats).
  // La cérémonie (écran résultat + insta) est réservée au top 10.
  var ms=elapsed, savedP=saveScore(playerName,ms);
  isTop10(ms).then(function(q){
    if(q){
      setTimeout(function(){
        showResult();
        savedP.then(function(saved){if(saved)checkTop10AndRevealInsta(ms);});
      },1500);
    } else {
      hudMsg.textContent='BOUCLÉ EN '+fmt(ms)+' · PAS DE TOP 10, REJOUE !';
      setTimeout(function(){if(phase==='done'){newSession();resetRun();}},2200);
    }
  });
}
function comment(ms){
  if(ms<2500)return 'SURHUMAIN. ON VÉRIFIE LES CAMÉRAS.';
  if(ms<3500)return 'PILOTE DE LIGNE. RESPECT.';
  if(ms<5000)return 'PROPRE. TRÈS PROPRE.';
  if(ms<8000)return 'HONORABLE. LES CRABES APPLAUDISSENT.';
  if(ms<15000)return 'TU AS PRIS TON TEMPS. ÇA COMPTE AUSSI.';
  return 'TU AS VISITÉ LA VOITURE, PAS COURU AUTOUR.';
}
function showResult(){
  var ok=(phase==='done');
  document.getElementById('resName').textContent=playerName;
  document.getElementById('topInstaBox').classList.add('hidden');
  if(ok){
    document.getElementById('resTime').textContent=fmt(elapsed);
    document.getElementById('resComment').textContent=comment(elapsed);
  } else {
    document.getElementById('resTime').textContent='ÉLIMINÉ';
    document.getElementById('resComment').textContent=deathReason;
  }
  show('sResult');
}

// ══════ ÉCRANS ══════
function show(id){
  ['sMenu','sResult','sLb'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}
function hideAll(){['sMenu','sResult','sLb'].forEach(function(s){document.getElementById(s).classList.add('hidden');});}

document.getElementById('btnPlay').addEventListener('click',function(){
  var ni=document.getElementById('nameInput');
  var n=ni.value.trim();
  if(!n){                             // pseudo obligatoire : feedback explicite
    ni.classList.add('need'); ni.focus();
    setTimeout(function(){ni.classList.remove('need');},900);
    return;
  }
  playerName=n.toUpperCase().slice(0,12);
  try{localStorage.setItem('td_name',playerName);}catch(e){}
  startBGM(); newSession(); hideAll(); resetRun();
});
// pseudo prérempli au retour
document.getElementById('nameInput').value=(playerName!=='ANONYME')?playerName:'';
console.log('TURBO DISCO V14');
document.getElementById('btnReplay').addEventListener('click',function(){
  newSession(); hideAll(); resetRun();
});
document.getElementById('btnLbMenu').addEventListener('click',function(){renderLb();show('sLb');});
document.getElementById('btnLbRes').addEventListener('click',function(){renderLb();show('sLb');});
document.getElementById('btnBack').addEventListener('click',function(){show('sMenu');phase='menu';});
document.getElementById('btnConfirmInsta').addEventListener('click',function(){
  var v=document.getElementById('instaInput').value.trim();
  if(!v)return;
  updateInsta(v).then(function(){
    document.getElementById('topInstaBox').innerHTML='<p class="sub" style="color:#ffd700">✓ ENREGISTRÉ · À BIENTÔT LE 8 AOÛT</p>';
  });
});
document.getElementById('btnShare').addEventListener('click',function(){
  var txt = (phase==='done')
    ? 'J\'ai bouclé le tour de la Corvette en '+fmt(elapsed)+' sur TURBO DISCO · FDP 2026 !'
    : 'Je me suis fait éliminer sur TURBO DISCO · FDP 2026. Fais mieux.';
  if(navigator.share){navigator.share({title:'Turbo Disco',text:txt,url:location.href}).catch(function(){});}
  else if(navigator.clipboard){
    navigator.clipboard.writeText(txt+' '+location.href);
    var b=this,o=b.textContent;b.textContent='✓ COPIÉ';setTimeout(function(){b.textContent=o;},1400);
  }
});
function renderLb(){
  var box=document.getElementById('lbContent');
  box.innerHTML='<p class="loader">CHARGEMENT...</p>';
  loadScores().then(function(s){
    if(!s||!s.length){box.innerHTML='<p class="sub">AUCUN SCORE. SOIS LE PREMIER.</p>';return;}
    var rows='<table class="lb-table"><tr><th>#</th><th>PILOTE</th><th>TEMPS</th></tr>';
    for(var i=0;i<s.length;i++){
      var cls = i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':'';
      var me = (s[i].name===playerName)?' class="me"':'';
      rows+='<tr'+me+'><td class="'+cls+'">'+(i+1)+'</td><td>'+s[i].name+'</td><td>'+fmt(s[i].time_ms)+'</td></tr>';
    }
    box.innerHTML=rows+'</table>';
  });
}

// ══════ BOUCLE ══════
function loop(t){
  if(phase==='running'){
    elapsed = t0 ? performance.now()-t0 : 0;
    hudTimer.textContent=fmt(elapsed);
  }
  if(phase==='menu'||phase==='ready')discoAng=t*0.0018;

  ctx.clearRect(0,0,W,H);
  drawFloor();
  drawDiscoBeams(t);
  drawTrail();
  drawCrowd(t);
  drawCar();
  drawDiscoBall(t);
  if(phase==='ready'||phase==='running')drawGhostRecord();
  if(phase==='done')drawConfetti();
  drawOverlayFX(t);
  requestAnimationFrame(loop);
}

// ══════ LOGO ══════
// Wordmark « racing » dans l'esprit de l'identité FDP 2025 : lettrage incliné
// + lignes de vitesse étagées à gauche, avec tiret détaché près des lettres
// (même langage que la voiture aux speed lines du logo 2025).
function drawLogo(){
  var lc=document.getElementById('logoCanvas');
  if(!lc)return;
  var g=lc.getContext('2d');
  g.setTransform(1,0,0,1,0,0);
  g.clearRect(0,0,lc.width,lc.height);
  g.imageSmoothingEnabled=false;
  g.setTransform(1,0,-0.22,1,26,0);       // italique racing (les rects suivent)
  g.font='30px "Press Start 2P"';
  g.textAlign='right';
  var x1=334-g.measureText('TURBO').width-5;   // les lignes meurent contre la 1re lettre
  function speedLines(yTop){
    var L=[88,46,106,62,90,42];           // longueurs étagées comme la voiture 2025
    for(var i=0;i<6;i++){
      var y=yTop+i*5.5, len=L[i];
      g.fillStyle=(i%3===2)?'#ffec80':'#ffd700';
      g.fillRect(x1-len,y,len-14,4);      // segment long
      g.fillRect(x1-10,y,10,4);           // tiret détaché (trou de 4px)
    }
  }
  g.fillStyle='#6b21a8'; g.fillText('TURBO',337,45);
  g.fillStyle='#ffd700'; g.fillText('TURBO',334,42);
  speedLines(13);
  g.fillStyle='#6b21a8'; g.fillText('DISCO',337,95);
  g.fillStyle='#ffd700'; g.fillText('DISCO',334,92);
  speedLines(63);
  g.setTransform(1,0,0,1,0,0);
}
drawLogo();
if(document.fonts&&document.fonts.ready){
  document.fonts.load('30px "Press Start 2P"').then(drawLogo);
  document.fonts.ready.then(drawLogo);
}

if(muted){var _bm=document.getElementById('btnMute');_bm.textContent='♪̸';_bm.style.color='#4a2470';}
loadCount();
loadTopScore();
resetRun();
phase='menu';
requestAnimationFrame(loop);
</script>
